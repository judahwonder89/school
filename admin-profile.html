<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Judah Wonders Model School · Admin Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa; --bg-sidebar: rgba(255,255,255,0.75);
            --text-primary: #0b1e33; --text-secondary: #2c3e50;
            --accent: #0A2540; --accent-glow: #C8963E;
            --border: rgba(0,0,0,0.08); --card-bg: rgba(255,255,255,0.7);
            --hover-bg: rgba(255,255,255,0.9); --shadow: 0 8px 20px -5px rgba(0,0,0,0.08);
            --input-bg: #ffffff;
            --success-bg: rgba(34,197,94,0.15); --success-text: #16a34a;
            --danger-bg: rgba(239,68,68,0.15); --danger-text: #b91c1c;
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e; --bg-sidebar: rgba(15,23,42,0.8);
            --text-primary: #f0f4fa; --text-secondary: #a0b3d9;
            --accent: #C8963E; --accent-glow: #D4AF37;
            --border: rgba(255,255,255,0.06); --card-bg: rgba(15,23,42,0.6);
            --hover-bg: rgba(30,41,59,0.8); --shadow: 0 8px 20px -5px rgba(0,0,0,0.4);
            --input-bg: rgba(30,41,59,0.9);
            --success-bg: rgba(34,197,94,0.15); --success-text: #4ade80;
            --danger-bg: rgba(239,68,68,0.15); --danger-text: #f87171;
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg-primary);
            color: var(--text-primary); min-height: 100vh; display: flex;
            position: relative; overflow-x: hidden;
        }
        .bg-logo {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; max-width: 70vw; opacity: 0.03; pointer-events: none;
            animation: breathe 6s ease-in-out infinite;
        }
        @keyframes breathe {
            0%,100% { transform: translate(-50%, -50%) scale(1); opacity: 0.03; }
            50% { transform: translate(-50%, -50%) scale(1.06); opacity: 0.06; }
        }
        .orb {
            position: fixed; width: 250px; height: 250px; border-radius: 50%; filter: blur(80px);
            pointer-events: none; animation: float 25s infinite alternate;
        }
        .orb-1 { top: -100px; left: -100px; background: radial-gradient(circle at 30% 30%, rgba(10,37,64,0.12), transparent 70%); }
        .orb-2 { bottom: -150px; right: -50px; width: 350px; height: 350px; background: radial-gradient(circle at 70% 70%, rgba(200,150,62,0.12), transparent); animation-duration: 30s; }
        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(40px,30px) scale(1.15); }
        }

        .sidebar {
            width: 260px; background: var(--bg-sidebar); backdrop-filter: blur(16px);
            border-right: 1px solid var(--border); padding: 1.5rem 0.8rem;
            display: flex; flex-direction: column; transition: width 0.3s;
            position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100;
            box-shadow: var(--shadow);
        }
        .sidebar.collapsed { width: 85px; }
        .sidebar .logo-area { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.8rem; padding: 0 0.3rem; text-decoration: none; }
        .sidebar .logo-area img { width: 38px; height: 38px; object-fit: contain; animation: logoPulse 3s ease-in-out infinite; }
        @keyframes logoPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
        .sidebar .logo-area h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; white-space: nowrap; color: var(--accent); line-height: 1.2; }
        .sidebar .logo-area h2 span { display: block; font-size: 0.6rem; letter-spacing: 1.5px; color: var(--accent-glow); }
        .sidebar.collapsed .logo-area h2 { display: none; }
        .sidebar .nav-item { display: flex; align-items: center; gap: 0.9rem; padding: 0.7rem 1rem; border-radius: 1rem; color: var(--text-secondary); transition: all 0.2s; cursor: pointer; margin-bottom: 0.25rem; text-decoration: none; font-weight: 500; white-space: nowrap; border: 1px solid transparent; font-size: 0.9rem; }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); border-color: var(--border); transform: translateX(3px); }
        .sidebar .nav-item.active { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); color: white; box-shadow: 0 6px 15px -5px var(--accent); }
        .sidebar .nav-item i { font-size: 1.2rem; width: 1.6rem; text-align: center; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 0.7rem; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 0.8rem 0.5rem; cursor: pointer; color: var(--text-secondary); font-size: 1.1rem; }
        .sidebar .toggle-btn:hover { color: var(--accent); }

        .main-content { flex: 1; margin-left: 260px; padding: 1.5rem; transition: margin-left 0.3s; max-width: calc(100vw - 260px); position: relative; z-index: 5; }
        .main-content.expanded { margin-left: 85px; max-width: calc(100vw - 85px); }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .page-title h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--accent); margin-bottom: 0.1rem; }
        .page-title p { color: var(--text-secondary); font-size: 0.85rem; }

        .profile-area { display: flex; align-items: center; gap: 1rem; }
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem; padding: 0.4rem 1rem; display: flex; align-items: center; gap: 0.4rem; cursor: pointer; color: var(--text-secondary); font-size: 0.8rem; transition: 0.2s; }
        .profile-pic { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-glow)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.9rem; box-shadow: 0 4px 10px var(--accent); overflow: hidden; }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .dropdown-menu { position: absolute; right: 0; top: 50px; background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: 1rem; padding: 0.4rem; min-width: 160px; display: none; z-index: 1000; }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item { padding: 0.6rem 1rem; color: var(--text-primary); border-radius: 0.8rem; display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; cursor: pointer; }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem; box-shadow: var(--shadow); max-width: 600px; margin: 0 auto; }
        .avatar-section { text-align: center; margin-bottom: 2rem; }
        .avatar-big { width: 130px; height: 130px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-glow)); margin: 0 auto 1rem; cursor: pointer; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white; font-weight: 700; border: 4px solid var(--accent); }
        .avatar-big img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .avatar-big .overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: white; font-size: 0.8rem; padding: 0.3rem; text-align: center; opacity: 0; transition: opacity 0.2s; }
        .avatar-big:hover .overlay { opacity: 1; }
        .upload-status { margin-top: 0.5rem; font-size: 0.85rem; min-height: 1.2rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; color: var(--text-secondary); font-weight: 500; }
        .form-control { width: 100%; padding: 0.75rem 1rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 1rem; color: var(--text-primary); font-size: 0.95rem; font-family: inherit; }
        .form-control:read-only { background: var(--hover-bg); }
        .btn { padding: 0.6rem 1.5rem; border: none; border-radius: 2rem; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); color: white; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }

        @media (max-width:768px) {
            .sidebar { width: 85px; }
            .sidebar .logo-area h2, .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 85px; max-width: calc(100vw - 85px); padding: 1rem; }
        }
    </style>
</head>
<body>
<img src="https://res.cloudinary.com/dda7kpir8/image/upload/q_auto/f_auto/v1781038310/ChatGPT_Image_Jun_9_2026_09_25_06_AM_elnine.png" alt="" class="bg-logo" aria-hidden="true">
<div class="orb orb-1"></div><div class="orb orb-2"></div>

<div class="sidebar" id="sidebar">
    <a href="index.html" class="logo-area">
        <img src="https://res.cloudinary.com/dda7kpir8/image/upload/q_auto/f_auto/v1781038310/ChatGPT_Image_Jun_9_2026_09_25_06_AM_elnine.png" alt="JWMS Logo">
        <h2>Judah Wonders<span>Model School</span></h2>
    </a>
    <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
    <a href="admin-users.html" class="nav-item"><i class="fas fa-users"></i><span>Users</span></a>
    <a href="admin-approvals.html" class="nav-item"><i class="fas fa-check-circle"></i><span>Approvals Hub</span></a>
    <a href="admin-audit.html" class="nav-item"><i class="fas fa-history"></i><span>Audit Logs</span></a>
    <a href="admin-profile.html" class="nav-item active"><i class="fas fa-user-cog"></i><span>Profile</span></a>
    <div class="toggle-btn" id="sidebarToggle"><i class="fas fa-chevron-left"></i></div>
</div>

<div class="main-content" id="mainContent">
    <div class="top-bar">
        <div class="page-title">
            <h1>Admin Profile</h1>
            <p>Update your photo and personal details</p>
        </div>
        <div class="profile-area">
            <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><span>Light</span><i class="fas fa-moon"></i></div>
            <div class="profile-dropdown">
                <div class="profile-pic" id="profilePic">MA</div>
                <div class="dropdown-menu"><div class="dropdown-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</div></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="avatar-section">
            <div class="avatar-big" id="avatarBig">
                <span id="avatarInitial">A</span>
                <img id="avatarImg" src="" style="display:none;">
                <div class="overlay"><i class="fas fa-camera"></i> Change</div>
                <input type="file" id="profileUpload" accept="image/*" style="display:none;">
            </div>
            <div id="uploadStatus" class="upload-status"></div>
        </div>

        <form id="profileForm">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" class="form-control" readonly>
            </div>
            <div class="form-group">
                <label>Surname</label>
                <input type="text" id="surname" class="form-control" readonly>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="form-control" readonly>
            </div>
            <div class="form-group">
                <label>Role</label>
                <input type="text" id="role" class="form-control" value="Master Admin" readonly>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone" class="form-control" placeholder="Not set">
            </div>
            <button type="submit" class="btn btn-primary">Update Phone</button>
        </form>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyADXHEiaSQ146QsGsaOCElARtpwrLE8svs",
        authDomain: "judah-c737e.firebaseapp.com",
        projectId: "judah-c737e",
        storageBucket: "judah-c737e.firebasestorage.app",
        messagingSenderId: "739196063078",
        appId: "1:739196063078:web:c0ee1c1da2cc3794ca8ca7",
        measurementId: "G-YEM22F1C39"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Sidebar & Theme
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    document.getElementById('sidebarToggle').addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        mainContent.classList.toggle('expanded');
        const icon = document.getElementById('sidebarToggle').querySelector('i');
        icon.classList.toggle('fa-chevron-left'); icon.classList.toggle('fa-chevron-right');
    });
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i:first-child');
    const themeText = themeToggle.querySelector('span');
    function updateThemeUI(theme) {
        themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        themeText.textContent = theme === 'dark' ? 'Dark' : 'Light';
    }
    const savedTheme = localStorage.getItem('judah-theme') || 'dark';
    html.setAttribute('data-theme', savedTheme); updateThemeUI(savedTheme);
    themeToggle.addEventListener('click', () => {
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next); localStorage.setItem('judah-theme', next);
        updateThemeUI(next);
    });

    let currentUserData = null;
    let currentUser = null;

    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'admin-login.html'; return; }
        currentUser = user;
        const doc = await db.collection('users').doc(user.uid).get();
        if (!doc.exists || !['master-admin','admin'].includes(doc.data().role)) {
            auth.signOut(); window.location.href = 'index.html'; return;
        }
        currentUserData = doc.data();
        populateProfile();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href='index.html'));

    function populateProfile() {
        document.getElementById('firstName').value = currentUserData.firstName || '';
        document.getElementById('surname').value = currentUserData.surname || '';
        document.getElementById('email').value = currentUserData.email || '';
        document.getElementById('phone').value = currentUserData.phone || '';
        document.getElementById('role').value = currentUserData.role === 'master-admin' ? 'Master Admin' : 'Admin';

        const avatarBig = document.getElementById('avatarBig');
        const avatarImg = document.getElementById('avatarImg');
        const avatarInitial = document.getElementById('avatarInitial');
        const profilePic = document.getElementById('profilePic');
        const initial = (currentUserData.firstName?.[0]||'A').toUpperCase();

        if (currentUserData.photoURL) {
            avatarImg.src = currentUserData.photoURL;
            avatarImg.style.display = 'block';
            avatarInitial.style.display = 'none';
            profilePic.innerHTML = `<img src="${currentUserData.photoURL}" alt="Admin">`;
        } else {
            avatarImg.style.display = 'none';
            avatarInitial.style.display = 'block';
            avatarInitial.textContent = initial;
            profilePic.textContent = initial;
        }
    }

    // Photo upload to Cloudinary
    const avatarBig = document.getElementById('avatarBig');
    const fileInput = document.getElementById('profileUpload');
    const uploadStatus = document.getElementById('uploadStatus');
    avatarBig.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Show preview
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('avatarImg').src = ev.target.result;
            document.getElementById('avatarImg').style.display = 'block';
            document.getElementById('avatarInitial').style.display = 'none';
            document.getElementById('profilePic').innerHTML = `<img src="${ev.target.result}" alt="Admin">`;
        };
        reader.readAsDataURL(file);

        // Upload
        uploadStatus.textContent = 'Uploading…';
        uploadStatus.className = 'upload-status';
        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'Judahschool');
            formData.append('folder', 'judah-wonders/admin-profile');

            const response = await fetch('https://api.cloudinary.com/v1_1/dda7kpir8/image/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.secure_url) {
                await db.collection('users').doc(currentUser.uid).update({ photoURL: data.secure_url });
                currentUserData.photoURL = data.secure_url;
                uploadStatus.textContent = 'Upload successful!';
                uploadStatus.className = 'upload-status success';
                populateProfile();
            } else {
                throw new Error(data.error?.message || 'Upload failed');
            }
        } catch (error) {
            console.error('Upload error:', error);
            uploadStatus.textContent = 'Error: ' + error.message;
            uploadStatus.className = 'upload-status error';
            // Revert to initials if upload fails
            document.getElementById('avatarImg').style.display = 'none';
            document.getElementById('avatarInitial').style.display = 'block';
            document.getElementById('profilePic').textContent = (currentUserData.firstName?.[0]||'A').toUpperCase();
        }
    });

    // Update phone
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const phone = document.getElementById('phone').value.trim();
        const btn = document.querySelector('.btn-primary');
        btn.disabled = true;
        btn.textContent = 'Saving…';
        try {
            await db.collection('users').doc(currentUser.uid).update({ phone, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert('Phone updated!');
        } catch (err) {
            alert('Error: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Update Phone';
        }
    });
</script>
</body>
</html>
