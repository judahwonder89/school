<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Firebase Indexes — Judah Wonders</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0f1e;
            color: #f0f4fa;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, #C8963E, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 2rem; }
        
        .card {
            background: rgba(15,23,42,0.9);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1rem;
            padding: 1.2rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            transition: all 0.2s;
        }
        .card.done {
            opacity: 0.5;
            border-color: rgba(34,197,94,0.3);
        }
        .card .num {
            background: rgba(200,150,62,0.15);
            color: #D4AF37;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .card.done .num {
            background: rgba(34,197,94,0.2);
            color: #4ade80;
        }
        .card .info { flex: 1; min-width: 0; }
        .card .collection {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
        }
        .card .fields {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.78rem;
            color: #a0b3d9;
            background: rgba(0,0,0,0.3);
            padding: 0.4rem 0.6rem;
            border-radius: 0.4rem;
            word-break: break-all;
            line-height: 1.5;
        }
        .card .purpose {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 0.3rem;
        }
        .card .actions {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex-shrink: 0;
        }
        .btn {
            padding: 0.45rem 0.9rem;
            border: none;
            border-radius: 1.5rem;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .btn-copy {
            background: rgba(200,150,62,0.15);
            color: #D4AF37;
            border: 1px solid rgba(200,150,62,0.3);
        }
        .btn-copy:hover { background: rgba(200,150,62,0.25); }
        .btn-copy.copied { background: rgba(34,197,94,0.2); color: #4ade80; border-color: rgba(34,197,94,0.3); }
        .btn-open {
            background: rgba(59,130,246,0.15);
            color: #60a5fa;
            border: 1px solid rgba(59,130,246,0.3);
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-open:hover { background: rgba(59,130,246,0.25); }
        .btn-done {
            background: transparent;
            color: #4ade80;
            border: 1px solid rgba(34,197,94,0.2);
            cursor: pointer;
        }
        .btn-done:hover { background: rgba(34,197,94,0.1); }
        .btn-done.marked { background: rgba(34,197,94,0.2); }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .progress-text {
            font-size: 0.85rem;
            color: #a0b3d9;
        }
        .progress-text span { color: #D4AF37; font-weight: 700; }
        .reset-btn {
            background: rgba(239,68,68,0.1);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.2);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .reset-btn:hover { background: rgba(239,68,68,0.2); }
        
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #16a34a;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }

        .firebase-url {
            display: block;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #60a5fa;
            font-size: 0.8rem;
            text-decoration: none;
        }
        .firebase-url:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Create Firebase Indexes</h1>
        <p class="subtitle">Judah Wonders Model School · 9 composite indexes</p>
        
        <a href="https://console.firebase.google.com/project/judah-c737e/firestore/indexes" target="_blank" class="firebase-url">
            📂 Open Firebase Indexes Page (keep this tab open)
        </a>
        
        <div class="top-bar">
            <div class="progress-text">Completed: <span id="doneCount">0</span> / 9</div>
            <button class="reset-btn" onclick="resetAll()">🔄 Reset All</button>
        </div>

        <div id="indexList"></div>
    </div>
    
    <div class="toast" id="toast">📋 Copied!</div>

    <script>
        const INDEXES = [
            { collection: 'timetableProposals', fields: 'classId ASC • teacherId ASC • status ASC • updatedAt DESC', purpose: 'Draft query' },
            { collection: 'timetableProposals', fields: 'classId ASC • teacherId ASC • status ASC • submittedAt DESC', purpose: 'Pending / Rejected query' },
            { collection: 'syllabus', fields: 'teacherId ASC • subject ASC • submittedAt DESC', purpose: 'Select subject' },
            { collection: 'lessonNotes', fields: 'teacherId ASC', purpose: 'Load all lesson notes' },
            { collection: 'lessonNotes', fields: 'teacherId ASC • subject ASC • week ASC • status ASC', purpose: 'Check duplicate' },
            { collection: 'dailyReports', fields: 'teacherId ASC • date DESC', purpose: 'Load my reports' },
            { collection: 'dailyReports', fields: 'teacherId ASC • date ASC', purpose: 'Check existing report' },
            { collection: 'auditLogs', fields: 'userId ASC • action ASC • timestamp DESC', purpose: 'Notifications' },
            { collection: 'pendingActions', fields: 'teacherId ASC • requestedAt DESC', purpose: 'My requests' }
        ];

        const FIREBASE_INDEX_URL = 'https://console.firebase.google.com/project/judah-c737e/firestore/indexes';
        
        // Load progress
        let completed = JSON.parse(localStorage.getItem('firebaseIndexesDone') || '[]');

        function saveProgress() {
            localStorage.setItem('firebaseIndexesDone', JSON.stringify(completed));
            document.getElementById('doneCount').textContent = completed.length;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1500);
            });
        }

        function renderList() {
            const list = document.getElementById('indexList');
            list.innerHTML = INDEXES.map((idx, i) => {
                const isDone = completed.includes(i);
                
                // Build copy text — Firebase format
                const fieldLines = idx.fields.split(' • ').map(f => {
                    const [name, order] = f.split(' ');
                    return `${name} ${order}`;
                }).join('\n');
                const copyText = `Collection: ${idx.collection}\nFields:\n${fieldLines}`;
                
                return `
                    <div class="card ${isDone ? 'done' : ''}">
                        <div class="num">${isDone ? '✓' : i + 1}</div>
                        <div class="info">
                            <div class="collection">${idx.collection}</div>
                            <div class="fields">${idx.fields}</div>
                            <div class="purpose">📌 ${idx.purpose}</div>
                        </div>
                        <div class="actions">
                            <button class="btn btn-copy" onclick="copyFields(${i}, this)" title="Copy collection & fields">📋 Copy</button>
                            <a href="${FIREBASE_INDEX_URL}" target="_blank" class="btn btn-open" onclick="markOpened(${i})">🔗 Open Firebase</a>
                            <button class="btn btn-done ${isDone ? 'marked' : ''}" onclick="toggleDone(${i})">${isDone ? '✅ Done' : 'Mark Done'}</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            saveProgress();
        }

        window.copyFields = function(i, btn) {
            const idx = INDEXES[i];
            const fieldLines = idx.fields.split(' • ').map(f => {
                const [name, order] = f.split(' ');
                return `${name} → ${order}`;
            }).join('\n');
            const copyText = `Collection: ${idx.collection}\n\nAdd these fields in order:\n${fieldLines}`;
            copyToClipboard(copyText);
            
            btn.classList.add('copied');
            btn.textContent = '✅ Copied!';
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.textContent = '📋 Copy';
            }, 2000);
        };

        window.markOpened = function(i) {
            // Don't auto-mark, just let them open
        };

        window.toggleDone = function(i) {
            if (completed.includes(i)) {
                completed = completed.filter(c => c !== i);
            } else {
                completed.push(i);
            }
            renderList();
        };

        window.resetAll = function() {
            if (confirm('Reset all progress? This cannot be undone.')) {
                completed = [];
                renderList();
            }
        };

        renderList();
    </script>
</body>
</html>
