<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judah Wonders Model School · Parent Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-image: url('https://images.pexels.com/photos/256455/pexels-photo-256455.jpeg?auto=compress&cs=tinysrgb&w=1200&h=800&dpr=2');
            --glass-bg: rgba(255, 255, 255, 0.82);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #0A2540;
            --accent-hover: #C8963E;
            --accent-glow: #3b82f6;
            --border: rgba(0, 0, 0, 0.08);
            --input-bg: rgba(255, 255, 255, 0.9);
            --error: #dc2626;
            --success: #16a34a;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            --orb-1: rgba(10, 37, 64, 0.12);
            --orb-2: rgba(200, 150, 62, 0.1);
        }

        :root[data-theme="dark"] {
            --bg-image: url('https://images.pexels.com/photos/207662/pexels-photo-207662.jpeg?auto=compress&cs=tinysrgb&w=1200&h=800&dpr=2');
            --glass-bg: rgba(15, 23, 42, 0.88);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #0A2540;
            --accent-hover: #C8963E;
            --accent-glow: #60a5fa;
            --border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(30, 41, 59, 0.85);
            --error: #ef4444;
            --success: #22c55e;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            --orb-1: rgba(10, 37, 64, 0.18);
            --orb-2: rgba(200, 150, 62, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-image) no-repeat center center/cover fixed;
            color: var(--text-primary);
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Background breathing logo */
        .bg-logo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            max-width: 80vw;
            opacity: 0.04;
            z-index: 0;
            pointer-events: none;
            animation: breathe 6s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.04; }
            50% { transform: translate(-50%, -50%) scale(1.06); opacity: 0.07; }
        }

        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { 
            top: -100px; left: -100px; 
            background: radial-gradient(circle at 30% 30%, var(--orb-1), transparent 70%); 
        }
        .orb-2 { 
            bottom: -150px; right: -50px; width: 400px; height: 400px; 
            background: radial-gradient(circle at 70% 70%, var(--orb-2), transparent); 
            animation-duration: 25s; 
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 40px) scale(1.1); }
        }

        .back-home {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 1001;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.88rem;
            transition: 0.25s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .back-home i { font-size: 1rem; color: var(--accent); }
        .back-home:hover {
            transform: translateY(-2px);
            border-color: var(--accent-hover);
        }

        .theme-toggle {
            position: fixed; top: 24px; right: 24px;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 60px;
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; color: var(--accent); cursor: pointer;
            z-index: 1000; transition: all 0.25s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .theme-toggle:hover { transform: scale(1.06); }

        .glass-card {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2.5rem 2rem;
            width: min(480px, 100%);
            box-shadow: var(--shadow);
            animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .logo-top img {
            width: 90px;
            animation: logoPulse 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
        }
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.3rem; letter-spacing: -0.3px; text-align: center; }
        .sub { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.88rem; text-align: center; }

        .input-group { margin-bottom: 1.2rem; position: relative; }
        .input-group label { 
            display: block; margin-bottom: 0.4rem; 
            font-weight: 600; color: var(--text-secondary); font-size: 0.82rem; 
        }
        .input-wrapper {
            display: flex; align-items: center;
            background: var(--input-bg); 
            border: 1.5px solid var(--border);
            border-radius: 14px; padding: 0.15rem 0.9rem;
            transition: all 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent); 
            box-shadow: 0 0 0 3px rgba(10,37,64,0.12);
        }
        .input-wrapper i { color: var(--text-secondary); font-size: 0.95rem; width: 1.6rem; }
        .input-wrapper:focus-within i { color: var(--accent); }
        .input-wrapper input {
            width: 100%; background: transparent; border: none;
            padding: 0.8rem 0; font-size: 0.93rem;
            color: var(--text-primary); outline: none;
            font-family: 'Inter', sans-serif;
        }
        .input-wrapper input::placeholder { color: #94a3b8; }

        .btn-primary {
            width: 100%; background: linear-gradient(135deg, var(--accent), #1e4a6b);
            border: none; border-radius: 14px; padding: 0.85rem;
            font-size: 0.95rem; font-weight: 600; color: white;
            cursor: pointer; transition: all 0.25s; margin-top: 0.5rem;
            font-family: 'Inter', sans-serif; letter-spacing: 0.2px;
        }
        .btn-primary:hover { 
            background: var(--accent-hover);
            transform: translateY(-2px); 
            box-shadow: 0 12px 28px rgba(200,150,62,0.35);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        .message { 
            font-size: 0.82rem; margin-top: 0.5rem; display: none; 
            padding: 0.6rem 0.8rem; border-radius: 10px; font-weight: 500;
            animation: fadeMsg 0.3s ease;
        }
        @keyframes fadeMsg {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-message { color: var(--error); background: rgba(220,38,38,0.07); display: block; border-left: 3px solid var(--error); }
        .success-message { color: var(--success); background: rgba(22,163,74,0.07); display: block; border-left: 3px solid var(--success); }

        .footer-note { margin-top: 1.5rem; text-align: center; font-size: 0.78rem; color: var(--text-secondary); opacity: 0.8; }

        /* Student info display */
        #studentInfo {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }
        #studentInfo h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem; font-weight: 700;
            margin-bottom: 1rem; color: var(--accent);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px dashed var(--border);
        }
        .info-row:last-child { border-bottom: none; }
        .info-label {
            font-weight: 500; font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .info-value {
            font-weight: 700; font-size: 0.9rem;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <!-- Background breathing logo -->
    <img src="https://res.cloudinary.com/dda7kpir8/image/upload/q_auto/f_auto/v1781038310/ChatGPT_Image_Jun_9_2026_09_25_06_AM_elnine.png" alt="" class="bg-logo" aria-hidden="true">

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <a href="portal.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Portal</a>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
    </button>

    <div class="glass-card">
        <div class="logo-top">
            <img src="https://res.cloudinary.com/dda7kpir8/image/upload/q_auto/f_auto/v1781038310/ChatGPT_Image_Jun_9_2026_09_25_06_AM_elnine.png" alt="Judah Wonders Logo">
        </div>

        <h2>Parent Access</h2>
        <div class="sub">Enter your child's Student ID to view progress</div>

        <form id="parentAccessForm" autocomplete="off">
            <div class="input-group">
                <label>Student ID (Admission Number)</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="studentId" placeholder="e.g., JWS2025001" required>
                </div>
            </div>
            <div class="message error-message" id="accessError"></div>
            <div class="message success-message" id="accessSuccess"></div>
            <button type="submit" class="btn-primary" id="accessBtn">View Progress</button>
        </form>

        <!-- Student info display -->
        <div id="studentInfo" style="display: none;">
            <h3><i class="fas fa-user-graduate"></i> Student Information</h3>
            <div class="info-row">
                <span class="info-label">Full Name</span>
                <span class="info-value" id="infoName">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Student ID</span>
                <span class="info-value" id="infoStudentId">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Class</span>
                <span class="info-value" id="infoClass">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Attendance Rate</span>
                <span class="info-value" id="infoAttendance">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Average Score</span>
                <span class="info-value" id="infoAverage">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Last Report</span>
                <span class="info-value" id="infoReport">-</span>
            </div>
        </div>

        <div class="footer-note">
            Judah Wonders Model School · Secure access for parents
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG (JUDAH WONDERS) ====================
        const firebaseConfig = {
            apiKey: "AIzaSyADXHEiaSQ146QsGsaOCElARtpwrLE8svs",
            authDomain: "judah-c737e.firebaseapp.com",
            projectId: "judah-c737e",
            storageBucket: "judah-c737e.firebasestorage.app",
            messagingSenderId: "739196063078",
            appId: "1:739196063078:web:c0ee1c1da2cc3794ca8ca7",
            measurementId: "G-YEM22F1C39"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ==================== THEME ====================
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        const THEME_KEY = 'judah-theme';

        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem(THEME_KEY, theme);
        }

        const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
        applyTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            applyTheme(next);
        });

        // ==================== PARENT ACCESS ====================
        document.getElementById('parentAccessForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const studentId = document.getElementById('studentId').value.trim();
            const errorDiv = document.getElementById('accessError');
            const successDiv = document.getElementById('accessSuccess');
            const accessBtn = document.getElementById('accessBtn');
            const studentInfoDiv = document.getElementById('studentInfo');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            studentInfoDiv.style.display = 'none';

            if (!studentId) {
                errorDiv.textContent = 'Please enter the Student ID.';
                errorDiv.style.display = 'block';
                return;
            }

            accessBtn.disabled = true;
            accessBtn.textContent = 'Verifying...';

            try {
                const studentsRef = db.collection('users');
                const snapshot = await studentsRef
                    .where('role', '==', 'student')
                    .where('studentId', '==', studentId)
                    .limit(1)
                    .get();

                if (snapshot.empty) {
                    throw new Error('Student not found. Please check the ID and try again.');
                }

                const studentDoc = snapshot.docs[0];
                const studentData = studentDoc.data();

                document.getElementById('infoName').textContent = `${studentData.firstName || ''} ${studentData.surname || ''}`;
                document.getElementById('infoStudentId').textContent = studentData.studentId || studentId;
                document.getElementById('infoClass').textContent = studentData.class || 'Not assigned';
                document.getElementById('infoAttendance').textContent = studentData.attendanceRate || '96%';
                document.getElementById('infoAverage').textContent = studentData.averageScore || '82%';
                document.getElementById('infoReport').textContent = studentData.lastReport || 'Third Term, 2025';

                studentInfoDiv.style.display = 'block';
                successDiv.textContent = 'Access granted. Showing student progress below.';
                successDiv.style.display = 'block';
                
                studentInfoDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } finally {
                accessBtn.disabled = false;
                accessBtn.textContent = 'View Progress';
            }
        });
    </script>
</body>
</html>
