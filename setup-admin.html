<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judah Wonders · Master Admin Setup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0A2540 0%, #1e3a5f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo img {
            width: 100px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #0A2540;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        p.subtitle {
            color: #475569;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
        }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid #cbd5e1;
            border-radius: 1rem;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus {
            border-color: #0A2540;
            box-shadow: 0 0 0 3px rgba(10,37,64,0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #0A2540, #1e4a6b);
            color: white;
            border: none;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            margin-top: 1rem;
        }
        .btn-primary:hover {
            background: #C8963E;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(200,150,62,0.3);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 0.8rem;
            font-weight: 500;
            font-size: 0.9rem;
            display: none;
        }
        .error { background: #fee2e2; color: #dc2626; display: block; }
        .success { background: #dcfce7; color: #16a34a; display: block; }
        .warning-box {
            background: #fef9c3;
            border-left: 4px solid #eab308;
            padding: 0.8rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.8rem;
            color: #854d0e;
        }
        .warning-box i { margin-right: 0.4rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="https://res.cloudinary.com/dda7kpir8/image/upload/q_auto/f_auto/v1781038310/ChatGPT_Image_Jun_9_2026_09_25_06_AM_elnine.png" alt="Judah Wonders Logo">
        </div>
        <h1>Master Admin Setup</h1>
        <p class="subtitle">Create the first admin account (one‑time use)</p>

        <div class="warning-box">
            <i class="fas fa-exclamation-triangle"></i>
            <strong>Important:</strong> This page creates a master admin with full privileges.
            Delete this file from your server after use.
        </div>

        <form id="setupForm">
            <div class="input-group">
                <label>First Name</label>
                <input type="text" id="firstName" placeholder="e.g., John" required>
            </div>
            <div class="input-group">
                <label>Surname</label>
                <input type="text" id="surname" placeholder="e.g., Doe" required>
            </div>
            <div class="input-group">
                <label>Gmail Address</label>
                <input type="email" id="email" placeholder="you@gmail.com" required>
            </div>
            <div class="input-group">
                <label>Password (min. 8 characters)</label>
                <input type="password" id="password" placeholder="••••••••" minlength="8" required>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Create Admin Account</button>
        </form>
        <div id="messageBox" class="message"></div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyADXHEiaSQ146QsGsaOCElARtpwrLE8svs",
            authDomain: "judah-c737e.firebaseapp.com",
            projectId: "judah-c737e",
            storageBucket: "judah-c737e.firebasestorage.app",
            messagingSenderId: "739196063078",
            appId: "1:739196063078:web:c0ee1c1da2cc3794ca8ca7",
            measurementId: "G-YEM22F1C39"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value.trim();
            const surname = document.getElementById('surname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const msgBox = document.getElementById('messageBox');

            msgBox.style.display = 'none';
            msgBox.className = 'message';

            if (!email.endsWith('@gmail.com')) {
                msgBox.textContent = 'Please use a Gmail address.';
                msgBox.className = 'message error';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating...';

            try {
                // Create user in Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Set admin document in Firestore – already approved
                await db.collection('users').doc(user.uid).set({
                    firstName,
                    surname,
                    email: user.email,
                    role: 'master-admin',
                    roles: ['master-admin'],        // array format for future use
                    approved: true,
                    status: 'approved',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                msgBox.textContent = '✅ Master admin created successfully! You can now log in.';
                msgBox.className = 'message success';

                // Sign out so they can log in normally
                await auth.signOut();

                // Redirect to admin login after 3 seconds
                setTimeout(() => {
                    window.location.href = 'admin-login.html';
                }, 3000);
            } catch (error) {
                console.error('Setup error:', error);
                let errorMsg = error.message;
                if (error.code === 'auth/email-already-in-use') {
                    errorMsg = 'This email is already registered. Try logging in or use a different Gmail.';
                }
                msgBox.textContent = 'Error: ' + errorMsg;
                msgBox.className = 'message error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Admin Account';
            }
        });
    </script>
</body>
</html>
