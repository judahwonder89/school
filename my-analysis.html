<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Judah Wonders Model School · My Analysis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa;
            --bg-secondary: #e2e8f0;
            --text-primary: #0b1e33;
            --text-secondary: #2c3e50;
            --text-muted: #64748b;
            --accent: #0A2540;
            --accent-glow: #C8963E;
            --accent-light: rgba(10,37,64,0.1);
            --border: rgba(0,0,0,0.08);
            --border-light: rgba(0,0,0,0.05);
            --card-bg: rgba(255,255,255,0.85);
            --card-bg-solid: #ffffff;
            --hover-bg: rgba(255,255,255,0.95);
            --hover-bg-alt: rgba(10,37,64,0.05);
            --shadow: 0 4px 20px -5px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px -5px rgba(0,0,0,0.12);
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
            --success-bg: rgba(34,197,94,0.12);
            --success-text: #16a34a;
            --success-border: rgba(34,197,94,0.3);
            --warning-bg: rgba(245,158,11,0.12);
            --warning-text: #b45309;
            --warning-border: rgba(245,158,11,0.3);
            --danger-bg: rgba(239,68,68,0.12);
            --danger-text: #b91c1c;
            --danger-border: rgba(239,68,68,0.3);
            --info-bg: rgba(10,37,64,0.08);
            --info-text: #0A2540;
            --info-border: rgba(10,37,64,0.2);
            --gradient-start: #0A2540;
            --gradient-end: #C8963E;
            --overlay-bg: rgba(0,0,0,0.5);
            --chart-grid: rgba(0,0,0,0.06);
            --tab-active-bg: #ffffff;
            --tab-hover-bg: rgba(10,37,64,0.05);
            --correct-bg: rgba(34,197,94,0.1);
            --wrong-bg: rgba(239,68,68,0.1);
            --unanswered-bg: rgba(245,158,11,0.1);
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e;
            --bg-secondary: #111827;
            --text-primary: #f0f4fa;
            --text-secondary: #a0b3d9;
            --text-muted: #64748b;
            --accent: #C8963E;
            --accent-glow: #D4AF37;
            --accent-light: rgba(200,150,62,0.15);
            --border: rgba(255,255,255,0.08);
            --border-light: rgba(255,255,255,0.05);
            --card-bg: rgba(15,23,42,0.75);
            --card-bg-solid: #0f172a;
            --hover-bg: rgba(30,41,59,0.9);
            --hover-bg-alt: rgba(200,150,62,0.08);
            --shadow: 0 4px 20px -5px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 30px -5px rgba(0,0,0,0.5);
            --input-bg: rgba(30,41,59,0.9);
            --input-border: rgba(255,255,255,0.1);
            --success-bg: rgba(34,197,94,0.15);
            --success-text: #4ade80;
            --success-border: rgba(34,197,94,0.3);
            --warning-bg: rgba(245,158,11,0.15);
            --warning-text: #fbbf24;
            --warning-border: rgba(245,158,11,0.3);
            --danger-bg: rgba(239,68,68,0.15);
            --danger-text: #f87171;
            --danger-border: rgba(239,68,68,0.3);
            --info-bg: rgba(200,150,62,0.12);
            --info-text: #D4AF37;
            --info-border: rgba(200,150,62,0.25);
            --gradient-start: #0A2540;
            --gradient-end: #C8963E;
            --overlay-bg: rgba(0,0,0,0.85);
            --chart-grid: rgba(255,255,255,0.06);
            --tab-active-bg: rgba(15,23,42,0.95);
            --tab-hover-bg: rgba(200,150,62,0.08);
            --correct-bg: rgba(34,197,94,0.15);
            --wrong-bg: rgba(239,68,68,0.15);
            --unanswered-bg: rgba(245,158,11,0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .top-bar {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 2px solid var(--accent);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-lg);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .top-bar .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
        }
        .top-bar .logo i {
            font-size: 1.5rem;
        }
        .back-btn {
            padding: 0.5rem 1rem;
            border: 2px solid var(--border);
            border-radius: 2rem;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-btn:hover {
            border-color: var(--accent);
            background: var(--hover-bg-alt);
        }

        /* Main Container */
        .main-container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Stats Overview Cards */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.2rem;
            padding: 1.2rem;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .stat-card .stat-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Space Grotesk', monospace;
            margin: 0.3rem 0;
        }
        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card.primary .stat-value { color: var(--accent); }
        .stat-card.success .stat-value { color: var(--success-text); }
        .stat-card.warning .stat-value { color: var(--warning-text); }
        .stat-card.danger .stat-value { color: var(--danger-text); }

        /* Tabs */
        .tabs-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 0.4rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 1.2rem;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            justify-content: center;
            min-width: 120px;
        }
        .tab-btn:hover {
            background: var(--tab-hover-bg);
            color: var(--text-primary);
        }
        .tab-btn.active {
            background: var(--tab-active-bg);
            color: var(--accent);
            box-shadow: var(--shadow);
        }
        .tab-btn .badge {
            background: var(--accent-light);
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            font-weight: 700;
        }

        /* Chart Container */
        .chart-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .chart-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        /* Assessment Grid */
        .assessment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1rem;
        }
        .assessment-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.2rem;
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .assessment-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }
        .assessment-card .card-type-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-assignment {
            background: var(--info-bg);
            color: var(--info-text);
            border: 1px solid var(--info-border);
        }
        .badge-test {
            background: var(--success-bg);
            color: var(--success-text);
            border: 1px solid var(--success-border);
        }
        .badge-exam {
            background: var(--danger-bg);
            color: var(--danger-text);
            border: 1px solid var(--danger-border);
        }
        .assessment-card h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            padding-right: 6rem;
        }
        .assessment-card .subject {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
        }
        .assessment-card .score-display {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 0.8rem 0;
        }
        .score-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.3rem;
            font-family: 'Space Grotesk', monospace;
            border: 3px solid;
            flex-shrink: 0;
        }
        .score-circle.grade-a {
            color: var(--success-text);
            border-color: var(--success-text);
            background: var(--success-bg);
        }
        .score-circle.grade-b {
            color: #60a5fa;
            border-color: #60a5fa;
            background: rgba(96,165,250,0.15);
        }
        .score-circle.grade-c {
            color: var(--warning-text);
            border-color: var(--warning-text);
            background: var(--warning-bg);
        }
        .score-circle.grade-d {
            color: #f97316;
            border-color: #f97316;
            background: rgba(249,115,22,0.15);
        }
        .score-circle.grade-f {
            color: var(--danger-text);
            border-color: var(--danger-text);
            background: var(--danger-bg);
        }
        .score-circle.awaiting {
            color: var(--text-muted);
            border-color: var(--text-muted);
            background: var(--hover-bg);
            font-size: 0.7rem;
        }
        .score-details {
            flex: 1;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .score-details strong {
            color: var(--text-primary);
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border-light);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Detailed Review Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: flex-start;
            z-index: 1000;
            overflow-y: auto;
            padding: 2rem 1rem;
            animation: fadeIn 0.3s;
        }
        .modal-overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: var(--card-bg-solid);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: all 0.3s;
        }
        .modal-close:hover {
            color: var(--danger-text);
            transform: rotate(90deg);
        }
        .review-question {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .review-question.correct {
            border-left: 4px solid var(--success-text);
            background: var(--correct-bg);
        }
        .review-question.wrong {
            border-left: 4px solid var(--danger-text);
            background: var(--wrong-bg);
        }
        .review-question.unanswered {
            border-left: 4px solid var(--warning-text);
            background: var(--unanswered-bg);
        }
        .review-question .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .review-question .q-number {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--accent);
        }
        .review-question .q-points {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .review-question .q-text {
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            line-height: 1.5;
        }
        .answer-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }
        .answer-box {
            padding: 0.7rem;
            border-radius: 0.8rem;
            font-size: 0.85rem;
        }
        .answer-box.student {
            background: var(--bg-primary);
            border: 1px solid var(--border);
        }
        .answer-box.correct-ans {
            background: var(--success-bg);
            border: 1px solid var(--success-border);
        }
        .answer-box .label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
            color: var(--text-muted);
        }
        .answer-box .value {
            font-weight: 600;
        }
        .result-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .result-badge.correct {
            background: var(--success-bg);
            color: var(--success-text);
        }
        .result-badge.wrong {
            background: var(--danger-bg);
            color: var(--danger-text);
        }
        .result-badge.awaiting {
            background: var(--warning-bg);
            color: var(--warning-text);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 5rem;
            right: 1rem;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            background: var(--card-bg-solid);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;
            min-width: 300px;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: flex-start;
            gap: 0.7rem;
            animation: slideInRight 0.3s;
            font-size: 0.85rem;
        }
        .toast.removing {
            animation: slideOutRight 0.3s ease-in forwards;
        }
        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-content {
            background: var(--card-bg-solid);
            padding: 2.5rem;
            border-radius: 1.5rem;
            text-align: center;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .top-bar {
                padding: 0.6rem 1rem;
                flex-direction: column;
            }
            .main-container {
                padding: 1rem 0.8rem;
            }
            .stats-overview {
                grid-template-columns: repeat(2, 1fr);
            }
            .assessment-grid {
                grid-template-columns: 1fr;
            }
            .answer-comparison {
                grid-template-columns: 1fr;
            }
            .chart-wrapper {
                height: 250px;
            }
            .tab-btn {
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo">
            <i class="fas fa-chart-line"></i>
            My Performance Analysis
        </div>
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Back to Assessments
        </button>
    </div>

    <div class="main-container">
        <!-- Stats Overview -->
        <div class="stats-overview" id="statsOverview"></div>

        <!-- Tabs -->
        <div class="tabs-container" id="tabsContainer">
            <button class="tab-btn active" onclick="switchTab('all')">
                <i class="fas fa-th-large"></i> All
                <span class="badge" id="allCount">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('assignment')">
                <i class="fas fa-tasks"></i> Assignments
                <span class="badge" id="assignmentCount">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('test')">
                <i class="fas fa-clipboard-check"></i> Tests
                <span class="badge" id="testCount">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('exam')">
                <i class="fas fa-graduation-cap"></i> Exams
                <span class="badge" id="examCount">0</span>
            </button>
        </div>

        <!-- Performance Chart -->
        <div class="chart-container" id="chartContainer">
            <div class="chart-header">
                <h2><i class="fas fa-chart-bar"></i> Performance Trend</h2>
            </div>
            <div class="chart-wrapper">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>

        <!-- Assessments Grid -->
        <div id="assessmentsGrid"></div>
    </div>

    <!-- Detailed Review Modal -->
    <div class="modal-overlay" id="reviewModal">
        <div class="modal-content" id="reviewContent"></div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h3>Loading Analysis...</h3>
        </div>
    </div>

    <script type="module">
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyADXHEiaSQ146QsGsaOCElARtpwrLE8svs",
            authDomain: "judah-c737e.firebaseapp.com",
            projectId: "judah-c737e",
            storageBucket: "judah-c737e.firebasestorage.app",
            messagingSenderId: "739196063078",
            appId: "1:739196063078:web:c0ee1c1da2cc3794ca8ca7",
            measurementId: "G-YEM22F1C39"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Theme
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('judah-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);

        // State
        let currentUser = null;
        let userData = null;
        let allSubmissions = [];
        let currentTab = 'all';
        let performanceChart = null;

        // Utility Functions
        function showToast(title, message, type = 'info') {
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <i class="fas ${icons[type]}" style="color:var(--${type === 'success' ? 'success' : type === 'error' ? 'danger' : type === 'warning' ? 'warning' : 'info'}-text);font-size:1.1rem;"></i>
                <div>
                    <strong>${escapeHtml(title)}</strong>
                    <br>
                    <span style="font-size:0.8rem;color:var(--text-secondary);">${escapeHtml(message)}</span>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function goBack() {
            window.location.href = 'my-assessments.html';
        }

        // Tab Switching
        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');
            renderAll();
        };

        // Load Data
        async function loadSubmissions() {
            showLoading();
            try {
                const snapshot = await db.collection('submissions')
                    .where('studentId', '==', currentUser.uid)
                    .orderBy('submittedAt', 'desc')
                    .get();

                allSubmissions = [];
                snapshot.forEach(doc => {
                    allSubmissions.push({ id: doc.id, ...doc.data() });
                });

                renderAll();
            } catch (e) {
                console.error('Error loading submissions:', e);
                showToast('Error', 'Failed to load analysis data.', 'error');
            } finally {
                hideLoading();
            }
        }

        // Calculate Statistics
        function calculateStats(submissions) {
            const graded = submissions.filter(s => s.graded === true);
            const pending = submissions.filter(s => s.graded === false);
            
            let totalScore = 0;
            let totalPoints = 0;
            let totalCorrect = 0;
            let totalWrong = 0;
            let totalUnanswered = 0;
            
            graded.forEach(s => {
                totalScore += s.score || 0;
                totalPoints += s.totalPoints || 0;
                totalCorrect += s.correctCount || 0;
                totalWrong += s.wrongCount || 0;
                totalUnanswered += s.unansweredCount || 0;
            });

            const avgPercentage = totalPoints > 0 ? ((totalScore / totalPoints) * 100).toFixed(1) : 0;
            const totalQuestions = totalCorrect + totalWrong + totalUnanswered;

            return {
                totalAssessments: submissions.length,
                gradedCount: graded.length,
                pendingCount: pending.length,
                avgPercentage: parseFloat(avgPercentage),
                totalScore,
                totalPoints,
                totalCorrect,
                totalWrong,
                totalUnanswered,
                totalQuestions,
                submissions: submissions
            };
        }

        // Get Grade Class
        function getGradeClass(percentage, graded) {
            if (!graded) return 'awaiting';
            if (percentage >= 80) return 'grade-a';
            if (percentage >= 70) return 'grade-b';
            if (percentage >= 60) return 'grade-c';
            if (percentage >= 50) return 'grade-d';
            return 'grade-f';
        }

        function getGradeLetter(percentage, graded) {
            if (!graded) return '?';
            if (percentage >= 80) return 'A';
            if (percentage >= 70) return 'B';
            if (percentage >= 60) return 'C';
            if (percentage >= 50) return 'D';
            if (percentage >= 40) return 'E';
            return 'F';
        }

        // Render Stats Overview
        function renderStatsOverview(submissions) {
            const stats = calculateStats(submissions);
            
            document.getElementById('statsOverview').innerHTML = `
                <div class="stat-card primary">
                    <div class="stat-icon">📝</div>
                    <div class="stat-value">${stats.totalAssessments}</div>
                    <div class="stat-label">Total Assessments</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value">${stats.gradedCount}</div>
                    <div class="stat-label">Graded</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-value">${stats.pendingCount}</div>
                    <div class="stat-label">Awaiting Grading</div>
                </div>
                <div class="stat-card ${stats.avgPercentage >= 70 ? 'success' : stats.avgPercentage >= 50 ? 'warning' : 'danger'}">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value">${stats.avgPercentage}%</div>
                    <div class="stat-label">Average Score</div>
                </div>
                ${stats.totalQuestions > 0 ? `
                <div class="stat-card success">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-value">${stats.totalCorrect}</div>
                    <div class="stat-label">Correct Answers</div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-icon">❌</div>
                    <div class="stat-value">${stats.totalWrong}</div>
                    <div class="stat-label">Wrong Answers</div>
                </div>
                ` : ''}
            `;
        }

        // Render Chart
        function renderChart(submissions) {
            const graded = submissions.filter(s => s.graded === true);
            
            if (graded.length === 0) {
                document.getElementById('chartContainer').style.display = 'none';
                return;
            }
            
            document.getElementById('chartContainer').style.display = 'block';
            
            // Group by subject
            const subjectMap = {};
            graded.forEach(s => {
                const subject = s.subject || 'General';
                if (!subjectMap[subject]) {
                    subjectMap[subject] = { scores: [], total: 0, count: 0 };
                }
                subjectMap[subject].scores.push(s.percentage || 0);
                subjectMap[subject].total += s.percentage || 0;
                subjectMap[subject].count++;
            });

            const labels = Object.keys(subjectMap);
            const data = labels.map(subject => {
                const avg = subjectMap[subject].total / subjectMap[subject].count;
                return Math.round(avg * 10) / 10;
            });
            const backgroundColors = data.map(pct => 
                pct >= 80 ? 'rgba(34,197,94,0.7)' :
                pct >= 60 ? 'rgba(245,158,11,0.7)' :
                'rgba(239,68,68,0.7)'
            );

            const ctx = document.getElementById('performanceChart').getContext('2d');
            
            if (performanceChart) {
                performanceChart.destroy();
            }

            performanceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Average Score (%)',
                        data: data,
                        backgroundColor: backgroundColors,
                        borderColor: backgroundColors.map(c => c.replace('0.7', '1')),
                        borderWidth: 2,
                        borderRadius: 8,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => `${context.parsed.y}%`
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            grid: {
                                color: 'var(--chart-grid)'
                            },
                            ticks: {
                                callback: (value) => value + '%',
                                color: 'var(--text-muted)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: 'var(--text-muted)'
                            }
                        }
                    }
                }
            });
        }

        // Render Assessment Grid
        function renderAssessmentsGrid(submissions) {
            const grid = document.getElementById('assessmentsGrid');
            
            if (submissions.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <i class="fas fa-inbox"></i>
                        <h3>No Assessments Yet</h3>
                        <p>Complete an assessment to see your performance analysis here.</p>
                    </div>
                `;
                return;
            }

            grid.className = 'assessment-grid';
            grid.innerHTML = submissions.map(sub => {
                const pct = sub.percentage || 0;
                const graded = sub.graded === true;
                const gradeClass = getGradeClass(pct, graded);
                const gradeLetter = getGradeLetter(pct, graded);
                const type = sub.type || 'assignment';
                
                const typeBadgeClass = type === 'assignment' ? 'badge-assignment' : 
                                       type === 'test' ? 'badge-test' : 'badge-exam';
                const typeIcon = type === 'assignment' ? 'fa-tasks' : 
                                 type === 'test' ? 'fa-clipboard-check' : 'fa-graduation-cap';

                const submittedDate = sub.submittedAt ? 
                    new Date(sub.submittedAt.seconds * 1000).toLocaleDateString('en-US', {
                        month: 'short', day: 'numeric', year: 'numeric'
                    }) : 'Unknown';

                return `
                    <div class="assessment-card" onclick="openDetailedReview('${sub.id}')">
                        <span class="card-type-badge ${typeBadgeClass}">
                            <i class="fas ${typeIcon}"></i> ${type}
                        </span>
                        <h3>${escapeHtml(sub.assessmentTitle || 'Untitled')}</h3>
                        <div class="subject">
                            <i class="fas fa-book"></i> ${escapeHtml(sub.subject || 'General')}
                        </div>
                        <div class="score-display">
                            <div class="score-circle ${gradeClass}">
                                ${graded ? gradeLetter : '<i class="fas fa-clock"></i>'}
                            </div>
                            <div class="score-details">
                                ${graded ? `
                                    <strong>${sub.score || 0}/${sub.totalPoints || 0}</strong> (${pct}%)
                                    <br>✅ ${sub.correctCount || 0} correct · ❌ ${sub.wrongCount || 0} wrong
                                    ${sub.unansweredCount ? `<br>⚠ ${sub.unansweredCount} unanswered` : ''}
                                    ${sub.theoryCount ? `<br>📝 ${sub.theoryCount} theory questions` : ''}
                                ` : `
                                    <strong>Awaiting Grading</strong>
                                    <br>Teacher is reviewing your work
                                    ${sub.theoryCount ? `<br>📝 ${sub.theoryCount} essay question(s)` : ''}
                                `}
                            </div>
                        </div>
                        <div class="card-footer">
                            <span><i class="fas fa-calendar"></i> ${submittedDate}</span>
                            <span style="color:var(--accent);font-weight:600;">
                                View Details <i class="fas fa-chevron-right"></i>
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Open Detailed Review
        window.openDetailedReview = function(submissionId) {
            const sub = allSubmissions.find(s => s.id === submissionId);
            if (!sub) return;

            const modal = document.getElementById('reviewModal');
            const content = document.getElementById('reviewContent');
            
            const pct = sub.percentage || 0;
            const graded = sub.graded === true;
            const gradeLetter = getGradeLetter(pct, graded);
            const gradeClass = getGradeClass(pct, graded);
            const submittedDate = sub.submittedAt ? 
                new Date(sub.submittedAt.seconds * 1000).toLocaleString('en-US', {
                    month: 'long', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
                }) : 'Unknown';

            let questionsHtml = '';
            if (sub.answers && sub.answers.length > 0) {
                questionsHtml = sub.answers.map((ans, idx) => {
                    const isCorrect = ans.isCorrect === true;
                    const isUnanswered = !ans.studentAnswer || ans.studentAnswer.trim() === '';
                    const isTheory = ans.type === 'theory';
                    
                    let statusClass = 'unanswered';
                    let statusLabel = 'Unanswered';
                    let statusBadgeClass = 'awaiting';
                    
                    if (isTheory) {
                        statusClass = 'unanswered';
                        statusLabel = 'Awaiting Teacher Review';
                        statusBadgeClass = 'awaiting';
                    } else if (isUnanswered) {
                        statusClass = 'unanswered';
                        statusLabel = 'Unanswered';
                        statusBadgeClass = 'awaiting';
                    } else if (isCorrect) {
                        statusClass = 'correct';
                        statusLabel = 'Correct';
                        statusBadgeClass = 'correct';
                    } else {
                        statusClass = 'wrong';
                        statusLabel = 'Incorrect';
                        statusBadgeClass = 'wrong';
                    }

                    return `
                        <div class="review-question ${statusClass}">
                            <div class="q-header">
                                <span class="q-number">Question ${idx + 1}</span>
                                <span class="q-points">${ans.points || 1} point(s)</span>
                                <span class="result-badge ${statusBadgeClass}">${statusLabel}</span>
                            </div>
                            <div class="q-text">${escapeHtml(ans.question || 'Question text not available')}</div>
                            ${isTheory ? `
                                <div style="margin-top:0.5rem;padding:0.8rem;background:var(--bg-primary);border-radius:0.8rem;border:1px solid var(--border);">
                                    <div class="label" style="font-size:0.7rem;font-weight:700;color:var(--text-muted);margin-bottom:0.3rem;">YOUR ANSWER</div>
                                    <div style="white-space:pre-wrap;font-size:0.9rem;">${escapeHtml(ans.studentAnswer || 'No answer provided')}</div>
                                </div>
                                <div style="margin-top:0.5rem;display:flex;align-items:center;gap:0.5rem;color:var(--warning-text);font-size:0.8rem;">
                                    <i class="fas fa-info-circle"></i> Your teacher will review this essay question
                                </div>
                            ` : `
                                <div class="answer-comparison">
                                    <div class="answer-box student">
                                        <div class="label">Your Answer</div>
                                        <div class="value">${escapeHtml(ans.studentAnswer || '(No answer)')}</div>
                                    </div>
                                    <div class="answer-box correct-ans">
                                        <div class="label">Correct Answer</div>
                                        <div class="value">${escapeHtml(String(ans.correctAnswer || 'N/A'))}</div>
                                    </div>
                                </div>
                            `}
                        </div>
                    `;
                }).join('');
            }

            content.innerHTML = `
                <div class="modal-header">
                    <div>
                        <h2 style="font-size:1.3rem;margin-bottom:0.3rem;">${escapeHtml(sub.assessmentTitle || 'Assessment Review')}</h2>
                        <p style="color:var(--text-muted);font-size:0.85rem;">
                            <i class="fas fa-book"></i> ${escapeHtml(sub.subject || 'General')} · 
                            <i class="fas fa-calendar"></i> ${submittedDate}
                            ${sub.timeSpent ? ` · <i class="fas fa-clock"></i> ${Math.floor(sub.timeSpent/60)}m ${sub.timeSpent%60}s spent` : ''}
                        </p>
                    </div>
                    <button class="modal-close" onclick="closeReviewModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <div style="display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">
                    <div style="flex:1;min-width:150px;background:var(--card-bg);border:1px solid var(--border);border-radius:1rem;padding:1rem;text-align:center;">
                        <div class="score-circle ${gradeClass}" style="margin:0 auto 0.5rem;width:70px;height:70px;font-size:1.5rem;">
                            ${graded ? gradeLetter : '<i class="fas fa-clock"></i>'}
                        </div>
                        <div style="font-weight:700;">${graded ? `${pct}%` : 'Pending'}</div>
                        <div style="font-size:0.75rem;color:var(--text-muted);">Score</div>
                    </div>
                    <div style="flex:1;min-width:150px;background:var(--card-bg);border:1px solid var(--border);border-radius:1rem;padding:1rem;text-align:center;">
                        <div style="font-size:1.5rem;font-weight:700;color:var(--success-text);">${sub.correctCount || 0}</div>
                        <div style="font-size:0.75rem;color:var(--text-muted);">Correct</div>
                    </div>
                    <div style="flex:1;min-width:150px;background:var(--card-bg);border:1px solid var(--border);border-radius:1rem;padding:1rem;text-align:center;">
                        <div style="font-size:1.5rem;font-weight:700;color:var(--danger-text);">${sub.wrongCount || 0}</div>
                        <div style="font-size:0.75rem;color:var(--text-muted);">Wrong</div>
                    </div>
                    <div style="flex:1;min-width:150px;background:var(--card-bg);border:1px solid var(--border);border-radius:1rem;padding:1rem;text-align:center;">
                        <div style="font-size:1.5rem;font-weight:700;color:var(--warning-text);">${(sub.unansweredCount || 0) + (sub.theoryCount || 0)}</div>
                        <div style="font-size:0.75rem;color:var(--text-muted);">Pending/Theory</div>
                    </div>
                </div>

                ${graded && sub.grade ? `
                    <div style="text-align:center;padding:1rem;background:var(--accent-light);border-radius:1rem;margin-bottom:1rem;border:1px solid var(--info-border);">
                        <span style="font-size:1.2rem;font-weight:700;color:var(--accent);">
                            Final Grade: ${sub.grade}
                        </span>
                    </div>
                ` : ''}

                ${!graded ? `
                    <div style="text-align:center;padding:1rem;background:var(--warning-bg);border-radius:1rem;margin-bottom:1rem;border:1px solid var(--warning-border);color:var(--warning-text);">
                        <i class="fas fa-hourglass-half"></i> 
                        <strong>Awaiting Teacher Review</strong>
                        <p style="font-size:0.85rem;margin-top:0.3rem;">Your teacher is currently reviewing this assessment. Scores will appear here once grading is complete.</p>
                    </div>
                ` : ''}

                <h3 style="margin-bottom:1rem;"><i class="fas fa-list-ul"></i> Questions Review</h3>
                <div style="max-height:50vh;overflow-y:auto;">
                    ${questionsHtml || '<p style="color:var(--text-muted);">No answer data available.</p>'}
                </div>
            `;

            modal.classList.add('active');
        };

        window.closeReviewModal = function() {
            document.getElementById('reviewModal').classList.remove('active');
        };

        // Close modal on overlay click
        document.getElementById('reviewModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeReviewModal();
            }
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeReviewModal();
            }
        });

        // Filter submissions by tab
        function getFilteredSubmissions() {
            if (currentTab === 'all') return allSubmissions;
            return allSubmissions.filter(s => s.type === currentTab);
        }

        // Update tab counts
        function updateTabCounts() {
            document.getElementById('allCount').textContent = allSubmissions.length;
            document.getElementById('assignmentCount').textContent = allSubmissions.filter(s => s.type === 'assignment').length;
            document.getElementById('testCount').textContent = allSubmissions.filter(s => s.type === 'test').length;
            document.getElementById('examCount').textContent = allSubmissions.filter(s => s.type === 'exam').length;
        }

        // Render Everything
        function renderAll() {
            const filtered = getFilteredSubmissions();
            updateTabCounts();
            renderStatsOverview(filtered);
            renderChart(filtered);
            renderAssessmentsGrid(filtered);
        }

        // Auth
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'signin.html';
                return;
            }
            currentUser = user;
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists || userDoc.data().role !== 'student') {
                    window.location.href = 'signin.html';
                    return;
                }
                userData = userDoc.data();
                
                // Check for specific assessment ID in URL
                const urlParams = new URLSearchParams(window.location.search);
                const assessmentId = urlParams.get('id');
                
                await loadSubmissions();
                
                // If redirected after submission, open that assessment's review
                if (assessmentId) {
                    const recentSub = allSubmissions.find(s => s.assessmentId === assessmentId);
                    if (recentSub) {
                        setTimeout(() => openDetailedReview(recentSub.id), 500);
                    }
                }
            } catch (e) {
                console.error('Auth error:', e);
                window.location.href = 'signin.html';
            }
        });

        console.log('Analysis page initialized successfully');
    </script>
</body>
</html>
