<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Judah Wonders Model School · Lesson Notes</title>
    
    <!-- Load Firebase with fallback and error detection -->
    <script>
        // Firebase loading tracker
        window.firebaseLoadStatus = {
            app: false,
            auth: false,
            firestore: false,
            remoteConfig: false,
            errors: []
        };
        
        function onFirebaseScriptError(scriptName) {
            window.firebaseLoadStatus.errors.push(`Failed to load: ${scriptName}`);
            console.error(`❌ Firebase script failed to load: ${scriptName}`);
            document.getElementById('debugContent')?.insertAdjacentHTML('beforeend', 
                `<div class="debug-log error"><span class="debug-timestamp">[${new Date().toTimeString().split(' ')[0]}]</span> ❌ Failed to load: ${scriptName}</div>`);
        }
    </script>
    
    <!-- Firebase SDK with error handling -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js" 
            onerror="onFirebaseScriptError('firebase-app-compat.js')"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js" 
            onerror="onFirebaseScriptError('firebase-auth-compat.js')"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js" 
            onerror="onFirebaseScriptError('firebase-firestore-compat.js')"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-remote-config-compat.js" 
            onerror="onFirebaseScriptError('firebase-remote-config-compat.js')"></script>
    
    <!-- Groq SDK (for AI) -->
    <script src="https://cdn.jsdelivr.net/npm/groq-sdk@0.5.0/dist/index.min.js" 
            onerror="console.error('Failed to load Groq SDK')"></script>
    
    <!-- ... rest of your head content (CSS, other scripts) ... -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* ... keep all your existing styles ... */
        
        /* Add critical warning banner */
        .critical-warning {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #ef4444;
            color: white;
            padding: 12px 20px;
            z-index: 10000;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            display: none;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }
        
        .critical-warning.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #C8963E;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Critical Warning Banner -->
    <div class="critical-warning" id="criticalWarning">
        ⚠️ <span id="criticalWarningText">Firebase failed to load</span> — 
        <a href="javascript:location.reload()" style="color:white;text-decoration:underline;">Reload Page</a>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div id="loadingText">Loading Firebase...</div>
        <div style="font-size:12px;opacity:0.7;" id="loadingDetail"></div>
    </div>
    
    <!-- ... rest of your body content ... -->
    
    <script>
        // ============================================
        // FIREBASE LOADING WITH RETRY LOGIC
        // ============================================
        (function checkFirebase() {
            const maxRetries = 10;
            const retryDelay = 2000; // 2 seconds
            let retryCount = 0;
            
            function updateLoading(message, detail = '') {
                const loadingText = document.getElementById('loadingText');
                const loadingDetail = document.getElementById('loadingDetail');
                if (loadingText) loadingText.textContent = message;
                if (loadingDetail) loadingDetail.textContent = detail;
                DebugSystem?.log(message, 'info');
            }
            
            function showCriticalWarning(message) {
                const warning = document.getElementById('criticalWarning');
                const warningText = document.getElementById('criticalWarningText');
                if (warning && warningText) {
                    warningText.textContent = message;
                    warning.classList.add('show');
                }
            }
            
            function hideLoading() {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) {
                    overlay.style.opacity = '0';
                    overlay.style.transition = 'opacity 0.5s';
                    setTimeout(() => overlay.remove(), 500);
                }
            }
            
            async function attemptFirebaseInit() {
                updateLoading(`Checking Firebase (attempt ${retryCount + 1}/${maxRetries})...`);
                
                // Check if Firebase SDKs loaded
                if (typeof firebase === 'undefined') {
                    throw new Error('Firebase not defined - SDK scripts may be blocked');
                }
                
                if (typeof firebase.initializeApp === 'undefined') {
                    throw new Error('Firebase app module not loaded');
                }
                
                if (typeof firebase.auth === 'undefined') {
                    throw new Error('Firebase auth module not loaded');
                }
                
                if (typeof firebase.firestore === 'undefined') {
                    throw new Error('Firebase firestore module not loaded');
                }
                
                // All modules available, initialize
                const firebaseConfig = {
                    apiKey: "AIzaSyADXHEiaSQ146QsGsaOCElARtpwrLE8svs",
                    authDomain: "judah-c737e.firebaseapp.com",
                    projectId: "judah-c737e",
                    storageBucket: "judah-c737e.firebasestorage.app",
                    messagingSenderId: "739196063078",
                    appId: "1:739196063078:web:c0ee1c1da2cc3794ca8ca7",
                    measurementId: "G-YEM22F1C39"
                };
                
                try {
                    firebase.initializeApp(firebaseConfig);
                    updateLoading('Firebase initialized successfully! ✅', 'Setting up services...');
                    
                    // Test the connection
                    const db = firebase.firestore();
                    db.enablePersistence({ synchronizeTabs: true }).catch(err => {
                        if (err.code === 'failed-precondition') {
                            console.warn('Multi-tab offline limited.');
                        }
                    });
                    
                    // Test write access
                    await db.collection('_connection_test').doc('test').set({
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        userAgent: navigator.userAgent
                    });
                    
                    updateLoading('Firebase connection verified! ✅', 'Starting application...');
                    hideLoading();
                    
                    // Initialize the debug system
                    if (typeof DebugSystem !== 'undefined') {
                        DebugSystem.log('✅ Firebase initialized and connected successfully', 'success');
                    }
                    
                    return true;
                    
                } catch (initError) {
                    throw new Error(`Firebase init failed: ${initError.message}`);
                }
            }
            
            async function retryInit() {
                while (retryCount < maxRetries) {
                    try {
                        const success = await attemptFirebaseInit();
                        if (success) return;
                    } catch (error) {
                        retryCount++;
                        console.error(`Firebase init attempt ${retryCount} failed:`, error.message);
                        
                        if (retryCount >= maxRetries) {
                            updateLoading('❌ Firebase failed to load after multiple attempts');
                            showCriticalWarning(`Firebase failed: ${error.message}. Check your internet connection or try reloading.`);
                            
                            // Keep loading overlay but show retry button
                            const overlay = document.getElementById('loadingOverlay');
                            if (overlay) {
                                overlay.innerHTML = `
                                    <div style="color:#ef4444;font-size:2rem;">❌</div>
                                    <div style="text-align:center;">
                                        <h3>Connection Failed</h3>
                                        <p style="font-size:14px;opacity:0.8;">${error.message}</p>
                                        <p style="font-size:12px;opacity:0.6;">Check your internet connection or try:</p>
                                        <button onclick="location.reload()" style="margin:10px;padding:10px 20px;background:#C8963E;color:white;border:none;border-radius:20px;cursor:pointer;font-size:14px;">
                                            🔄 Reload Page
                                        </button>
                                        <br>
                                        <a href="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js" target="_blank" style="color:#93c5fd;font-size:11px;">
                                            Test if Firebase CDN is accessible
                                        </a>
                                    </div>
                                `;
                            }
                            return;
                        }
                        
                        updateLoading(`Retrying... (${retryCount}/${maxRetries})`, `Error: ${error.message}`);
                        await new Promise(resolve => setTimeout(resolve, retryDelay));
                    }
                }
            }
            
            // Start the initialization
            retryInit();
        })();
        
        // ============================================
        // ENHANCED DEBUG SYSTEM
        // ============================================
        const DebugSystem = {
            logs: [],
            errorCount: 0,
            startTime: new Date(),
            
            log(message, type = 'info', data = null) {
                const timestamp = new Date();
                const timeStr = timestamp.toTimeString().split(' ')[0];
                
                const logEntry = {
                    timestamp,
                    timeStr,
                    message,
                    type,
                    data: data ? (typeof data === 'object' ? JSON.stringify(data, null, 2) : String(data)) : null
                };
                
                this.logs.push(logEntry);
                
                if (type === 'error') {
                    this.errorCount++;
                    this.updateErrorBadge();
                }
                
                this.renderLog(logEntry);
                this.updateTimeDisplay();
                
                const consoleMethod = type === 'error' ? 'error' : 
                                     type === 'warning' ? 'warn' : 
                                     type === 'success' ? 'log' : 'log';
                console[consoleMethod](`[${timeStr}] ${message}`, data || '');
            },
            
            renderLog(logEntry) {
                const debugContent = document.getElementById('debugContent');
                if (!debugContent) return;
                
                const logDiv = document.createElement('div');
                logDiv.className = `debug-log ${logEntry.type}`;
                
                let logHTML = `<span class="debug-timestamp">[${logEntry.timeStr}]</span> ${escapeHtml(logEntry.message)}`;
                
                if (logEntry.data) {
                    logHTML += `<div class="error-detail">${escapeHtml(logEntry.data)}</div>`;
                }
                
                logDiv.innerHTML = logHTML;
                debugContent.appendChild(logDiv);
                debugContent.scrollTop = debugContent.scrollHeight;
            },
            
            updateErrorBadge() {
                const badge = document.getElementById('debugErrorCount');
                if (badge) {
                    badge.textContent = this.errorCount;
                    badge.style.display = this.errorCount > 0 ? 'flex' : 'none';
                }
            },
            
            updateTimeDisplay() {
                const timeDisplay = document.getElementById('debugTime');
                if (timeDisplay) {
                    const now = new Date();
                    timeDisplay.textContent = now.toTimeString().split(' ')[0];
                }
            },
            
            clear() {
                this.logs = [];
                this.errorCount = 0;
                const debugContent = document.getElementById('debugContent');
                if (debugContent) {
                    debugContent.innerHTML = '';
                    this.log('Console cleared', 'info');
                }
                this.updateErrorBadge();
            }
        };
        
        // Helper for HTML escaping
        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }
        
        function escapeAttr(s) {
            return (s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        
        // ============================================
        // FIREBASE CONNECTION CHECKER
        // ============================================
        function checkFirebaseStatus() {
            const status = {
                firebaseLoaded: typeof firebase !== 'undefined',
                firebaseInitialized: typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0,
                authAvailable: typeof firebase !== 'undefined' && typeof firebase.auth === 'function',
                firestoreAvailable: typeof firebase !== 'undefined' && typeof firebase.firestore === 'function',
                remoteConfigAvailable: typeof firebase !== 'undefined' && typeof firebase.remoteConfig === 'function',
                currentUser: null,
                networkOnline: navigator.onLine,
                errors: window.firebaseLoadStatus?.errors || []
            };
            
            DebugSystem.log('📊 Firebase Status Check:', 'info');
            DebugSystem.log(`   SDK Loaded: ${status.firebaseLoaded ? '✅ Yes' : '❌ No'}`, status.firebaseLoaded ? 'success' : 'error');
            DebugSystem.log(`   Initialized: ${status.firebaseInitialized ? '✅ Yes' : '❌ No'}`, status.firebaseInitialized ? 'success' : 'error');
            DebugSystem.log(`   Auth: ${status.authAvailable ? '✅ Available' : '❌ Not available'}`, status.authAvailable ? 'success' : 'error');
            DebugSystem.log(`   Firestore: ${status.firestoreAvailable ? '✅ Available' : '❌ Not available'}`, status.firestoreAvailable ? 'success' : 'error');
            DebugSystem.log(`   Remote Config: ${status.remoteConfigAvailable ? '✅ Available' : '❌ Not available'}`, status.remoteConfigAvailable ? 'success' : 'error');
            DebugSystem.log(`   Network: ${status.networkOnline ? '✅ Online' : '❌ Offline'}`, status.networkOnline ? 'success' : 'error');
            
            if (status.errors.length > 0) {
                DebugSystem.log(`   Script Load Errors: ${status.errors.length}`, 'error');
                status.errors.forEach(err => DebugSystem.log(`     - ${err}`, 'error'));
            }
            
            // Check if gstatic.com is accessible
            DebugSystem.log('🔍 Testing CDN accessibility...', 'info');
            fetch('https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js', { method: 'HEAD', mode: 'no-cors' })
                .then(() => DebugSystem.log('   Firebase CDN: ✅ Accessible', 'success'))
                .catch(() => DebugSystem.log('   Firebase CDN: ❌ BLOCKED - Check your network/firewall', 'error'));
            
            return status;
        }
        
        // Auto-check status after a delay (to allow Firebase to load)
        setTimeout(checkFirebaseStatus, 5000);
        setTimeout(checkFirebaseStatus, 15000);
        
        // ============================================
        // FIXED DIAGNOSTICS
        // ============================================
        async function runDiagnostics() {
            DebugSystem.log('========================================', 'info');
            DebugSystem.log('🔬 RUNNING COMPREHENSIVE DIAGNOSTICS', 'info');
            DebugSystem.log('========================================', 'info');
            
            // Test 1: Check if Firebase is defined
            DebugSystem.log('Test 1: Firebase SDK Loading', 'verbose');
            if (typeof firebase !== 'undefined') {
                DebugSystem.log('✅ Firebase SDK is loaded', 'success');
                
                if (firebase.apps && firebase.apps.length > 0) {
                    DebugSystem.log(`✅ Firebase is initialized (${firebase.apps.length} app(s))`, 'success');
                } else {
                    DebugSystem.log('⚠️ Firebase SDK loaded but NOT initialized', 'warning');
                }
            } else {
                DebugSystem.log('❌ Firebase SDK is NOT loaded', 'error');
                DebugSystem.log('   → Check if gstatic.com is accessible from your network', 'error');
                DebugSystem.log('   → Try: https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js', 'verbose');
                
                // Check network
                if (!navigator.onLine) {
                    DebugSystem.log('   → You are OFFLINE', 'error');
                } else {
                    DebugSystem.log('   → You are online but CDN may be blocked', 'error');
                    DebugSystem.log('   → Check firewall, VPN, or mobile data restrictions', 'verbose');
                }
            }
            
            // Test 2: Check Groq SDK
            DebugSystem.log('Test 2: Groq AI SDK', 'verbose');
            if (typeof Groq !== 'undefined') {
                DebugSystem.log('✅ Groq SDK is loaded', 'success');
            } else {
                DebugSystem.log('⚠️ Groq SDK not loaded (AI features will not work)', 'warning');
                DebugSystem.log('   → Check if cdn.jsdelivr.net is accessible', 'verbose');
            }
            
            // Test 3: Network diagnostics
            DebugSystem.log('Test 3: Network Diagnostics', 'verbose');
            DebugSystem.log(`   Online: ${navigator.onLine}`, navigator.onLine ? 'success' : 'error');
            DebugSystem.log(`   Connection type: ${navigator.connection?.effectiveType || 'Unknown'}`, 'verbose');
            DebugSystem.log(`   Downlink: ${navigator.connection?.downlink || 'Unknown'} Mbps`, 'verbose');
            DebugSystem.log(`   RTT: ${navigator.connection?.rtt || 'Unknown'} ms`, 'verbose');
            
            // Test 4: Try to access Firebase directly
            if (typeof firebase !== 'undefined') {
                DebugSystem.log('Test 4: Firebase Services', 'verbose');
                
                try {
                    const auth = firebase.auth();
                    DebugSystem.log('   Auth service: ✅ Available', 'success');
                } catch (e) {
                    DebugSystem.log(`   Auth service: ❌ ${e.message}`, 'error');
                }
                
                try {
                    const db = firebase.firestore();
                    DebugSystem.log('   Firestore service: ✅ Available', 'success');
                } catch (e) {
                    DebugSystem.log(`   Firestore service: ❌ ${e.message}`, 'error');
                }
                
                try {
                    const rc = firebase.remoteConfig();
                    DebugSystem.log('   Remote Config service: ✅ Available', 'success');
                } catch (e) {
                    DebugSystem.log(`   Remote Config service: ❌ ${e.message}`, 'error');
                }
            }
            
            DebugSystem.log('========================================', 'info');
            DebugSystem.log('✅ DIAGNOSTICS COMPLETE', 'success');
            DebugSystem.log('========================================', 'info');
            DebugSystem.log('💡 TIP: If Firebase SDK is NOT loaded, check:', 'info');
            DebugSystem.log('   1. Your internet connection', 'info');
            DebugSystem.log('   2. If gstatic.com is blocked by your ISP', 'info');
            DebugSystem.log('   3. If you have a firewall/VPN blocking CDN scripts', 'info');
            DebugSystem.log('   4. Try using WiFi instead of mobile data', 'info');
        }
        
        // Export functions
        window.toggleDebugWindow = function() {
            const debugWindow = document.getElementById('debugWindow');
            const toggle = document.getElementById('debugToggle');
            if (debugWindow.classList.contains('visible')) {
                debugWindow.classList.remove('visible');
                toggle.classList.remove('active');
            } else {
                debugWindow.classList.add('visible');
                toggle.classList.add('active');
                DebugSystem.updateTimeDisplay();
            }
        };
        window.runDiagnostics = runDiagnostics;
        window.clearDebugLogs = () => DebugSystem.clear();
        window.checkFirebaseStatus = checkFirebaseStatus;
        
        // Initialize debug
        DebugSystem.log('🐛 Debug system initialized', 'success');
        DebugSystem.log('Click the 🐛 button to open debug panel', 'info');
        DebugSystem.log(`Network: ${navigator.onLine ? 'Online' : 'OFFLINE'}`, navigator.onLine ? 'success' : 'error');
        
        // Auto-check Firebase after delay
        setTimeout(() => {
            DebugSystem.log('Running auto-check...', 'info');
            checkFirebaseStatus();
        }, 3000);
        
        console.log('✅ Debug and Firebase loader initialized');
    </script>
</body>
</html>
