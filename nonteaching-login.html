<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judah Wonders Model School · Non‑Teaching Staff</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="light"] {
            --bg-image: url('https://images.pexels.com/photos/159213/books-bookstore-book-reading-159213.jpeg?auto=compress&cs=tinysrgb&w=1200&h=800&dpr=2');
            --glass-bg: rgba(255, 255, 255, 0.82);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #0A2540;
            --accent-hover: #C8963E;
            --accent-glow: #3b82f6;
            --border: rgba(0, 0, 0, 0.08);
            --input-bg: rgba(255, 255, 255, 0.9);
            --error: #dc2626;
            --success: #16a34a;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            --orb-1: rgba(10, 37, 64, 0.12);
            --orb-2: rgba(200, 150, 62, 0.1);
        }

        :root[data-theme="dark"] {
            --bg-image: url('https://images.pexels.com/photos/207662/pexels-photo-207662.jpeg?auto=compress&cs=tinysrgb&w=1200&h=800&dpr=2');
            --glass-bg: rgba(15, 23, 42, 0.88);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #0A2540;
            --accent-hover: #C8963E;
            --accent-glow: #60a5fa;
            --border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(30, 41, 59, 0.85);
            --error: #ef4444;
            --success: #22c55e;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            --orb-1: rgba(10, 37, 64, 0.18);
            --orb-2: rgba(200, 150, 62, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-image) no-repeat center center/cover fixed;
            color: var(--text-primary);
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Background breathing logo */
        .bg-logo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            max-width: 80vw;
            opacity: 0.04;
            z-index: 0;
            pointer-events: none;
            animation: breathe 6s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.04; }
            50% { transform: translate(-50%, -50%) scale(1.06); opacity: 0.07; }
        }

        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { 
            top: -100px; left: -100px; 
            background: radial-gradient(circle at 30% 30%, var(--orb-1), transparent 70%); 
        }
        .orb-2 { 
            bottom: -150px; right: -50px; width: 400px; height: 400px; 
            background: radial-gradient(circle at 70% 70%, var(--orb-2), transparent); 
            animation-duration: 25s; 
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 40px) scale(1.1); }
        }

        .back-home {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 1001;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.88rem;
            transition: 0.25s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .back-home i { font-size: 1rem; color: var(--accent); }
        .back-home:hover {
            transform: translateY(-2px);
            border-color: var(--accent-hover);
        }

        .theme-toggle {
            position: fixed; top: 24px; right: 24px;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 60px;
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; color: var(--accent); cursor: pointer;
            z-index: 1000; transition: all 0.25s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .theme-toggle:hover { transform: scale(1.06); }

        .glass-card {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2.5rem 2rem;
            width: min(520px, 100%);
            box-shadow: var(--shadow);
            animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .logo-top img {
            width: 90px;
            animation: logoPulse 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
        }
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .tabs {
            display: flex; gap: 0.5rem; margin-bottom: 2rem;
            background: rgba(0,0,0,0.06); border-radius: 50px; padding: 4px;
        }
        :root[data-theme="dark"] .tabs { background: rgba(255,255,255,0.05); }
        .tab {
            flex: 1; text-align: center; padding: 0.7rem 0;
            border-radius: 50px; font-weight: 600; cursor: pointer;
            transition: 0.25s; color: var(--text-secondary);
            font-size: 0.9rem; border: none; background: transparent;
            font-family: 'Inter', sans-serif;
        }
        .tab.active {
            background: var(--accent); color: white;
            box-shadow: 0 4px 15px rgba(10,37,64,0.3);
        }

        h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.3rem; letter-spacing: -0.3px; }
        .sub { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.88rem; }

        .input-group { margin-bottom: 1.2rem; position: relative; }
        .input-group label { 
            display: block; margin-bottom: 0.4rem; 
            font-weight: 600; color: var(--text-secondary); font-size: 0.82rem; 
        }
        .input-wrapper {
            display: flex; align-items: center;
            background: var(--input-bg); 
            border: 1.5px solid var(--border);
            border-radius: 14px; padding: 0.15rem 0.9rem;
            transition: all 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent); 
            box-shadow: 0 0 0 3px rgba(10,37,64,0.12);
        }
        .input-wrapper i { color: var(--text-secondary); font-size: 0.95rem; width: 1.6rem; }
        .input-wrapper:focus-within i { color: var(--accent); }
        .input-wrapper input {
            width: 100%; background: transparent; border: none;
            padding: 0.8rem 0; font-size: 0.93rem;
            color: var(--text-primary); outline: none;
            font-family: 'Inter', sans-serif;
        }
        .input-wrapper input::placeholder { color: #94a3b8; }
        .input-wrapper .phone-prefix {
            color: var(--text-secondary); font-size: 0.93rem; 
            padding-right: 0.2rem; font-weight: 500;
        }
        .toggle-password { 
            cursor: pointer; color: var(--text-secondary); 
            font-size: 0.95rem; padding: 0 0.2rem; transition: color 0.2s;
        }
        .toggle-password:hover { color: var(--accent-hover); }

        .btn-primary {
            width: 100%; background: linear-gradient(135deg, var(--accent), #1e4a6b);
            border: none; border-radius: 14px; padding: 0.85rem;
            font-size: 0.95rem; font-weight: 600; color: white;
            cursor: pointer; transition: all 0.25s; margin-top: 0.5rem;
            font-family: 'Inter', sans-serif; letter-spacing: 0.2px;
        }
        .btn-primary:hover { 
            background: var(--accent-hover);
            transform: translateY(-2px); 
            box-shadow: 0 12px 28px rgba(200,150,62,0.35);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        .message { 
            font-size: 0.82rem; margin-top: 0.5rem; display: none; 
            padding: 0.6rem 0.8rem; border-radius: 10px; font-weight: 500;
            animation: fadeMsg 0.3s ease;
        }
        @keyframes fadeMsg {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-message { color: var(--error); background: rgba(220,38,38,0.07); display: block; border-left: 3px solid var(--error); }
        .success-message { color: var(--success); background: rgba(22,163,74,0.07); display: block; border-left: 3px solid var(--success); }
        .info-message { color: var(--accent); background: rgba(10,37,64,0.07); display: block; border-left: 3px solid var(--accent); }

        .footer-note { margin-top: 1.5rem; text-align: center; font-size: 0.78rem; color: var(--text-secondary); opacity: 0.8; }
        .resend-link { color: var(--accent-hover); cursor: pointer; text-decoration: underline; font-weight: 600; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- Background breathing logo -->
    <img src="https://res.cloudinary.com/dda7kpir8/image/upload/q_auto/f_auto/v1781038310/ChatGPT_Image_Jun_9_2026_09_25_06_AM_elnine.png" alt="" class="bg-logo" aria-hidden="true">

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <a href="portal.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Portal</a>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
    </button>

    <div class="glass-card">
        <div class="logo-top">
            <img src="https://res.cloudinary.com/dda7kpir8/image/upload/q_auto/f_auto/v1781038310/ChatGPT_Image_Jun_9_2026_09_25_06_AM_elnine.png" alt="Judah Wonders Logo">
        </div>

        <div class="tabs">
            <button class="tab active" id="loginTab">Sign In</button>
            <button class="tab" id="signupTab">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <h2>Welcome back</h2>
            <div class="sub">Non‑teaching staff login (or promoted teacher)</div>
            <form id="staffLoginForm" autocomplete="off">
                <div class="input-group">
                    <label>Email address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="staff@school.edu" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                </div>
                <div class="message error-message" id="loginError"></div>
                <div class="message info-message" id="loginInfo"></div>
                <button type="submit" class="btn-primary" id="loginBtn">Sign in</button>
            </form>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="hidden">
            <h2>Create staff account</h2>
            <div class="sub">Register as non‑teaching staff</div>
            <form id="staffSignupForm" autocomplete="off">
                <div class="input-group">
                    <label>First Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupFirstName" placeholder="John" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Surname</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupSurname" placeholder="Doe" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Phone (with +234)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone-alt"></i>
                        <span class="phone-prefix">+234</span>
                        <input type="tel" id="signupPhone" placeholder="800 000 0000" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Email address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="staff@example.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="Min. 8 characters" required minlength="8">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signupPassword', this)"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupConfirm" placeholder="Re-enter password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signupConfirm', this)"></i>
                    </div>
                </div>
                <div class="message error-message" id="signupError"></div>
                <div class="message success-message" id="signupSuccess"></div>
                <button type="submit" class="btn-primary" id="signupBtn">Register</button>
            </form>
        </div>

        <div class="footer-note">
            Judah Wonders Model School · Secure access · Approval required
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG (JUDAH WONDERS) ====================
        const firebaseConfig = {
            apiKey: "AIzaSyADXHEiaSQ146QsGsaOCElARtpwrLE8svs",
            authDomain: "judah-c737e.firebaseapp.com",
            projectId: "judah-c737e",
            storageBucket: "judah-c737e.firebasestorage.app",
            messagingSenderId: "739196063078",
            appId: "1:739196063078:web:c0ee1c1da2cc3794ca8ca7",
            measurementId: "G-YEM22F1C39"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== THEME ====================
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        const THEME_KEY = 'judah-theme';

        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            themeIcon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem(THEME_KEY, theme);
        }

        const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
        applyTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            applyTheme(next);
        });

        // ==================== TABS ====================
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginDiv = document.getElementById('loginForm');
        const signupDiv = document.getElementById('signupForm');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginDiv.classList.remove('hidden');
            signupDiv.classList.add('hidden');
            clearMessages();
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupDiv.classList.remove('hidden');
            loginDiv.classList.add('hidden');
            clearMessages();
        });

        function clearMessages() {
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('loginInfo').style.display = 'none';
            document.getElementById('signupError').style.display = 'none';
            document.getElementById('signupSuccess').style.display = 'none';
        }

        // ==================== PASSWORD TOGGLE ====================
        window.togglePassword = function(fieldId, eyeIcon) {
            const input = document.getElementById(fieldId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        };

        // ==================== LOGIN ====================
        document.getElementById('staffLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('loginError');
            const infoDiv = document.getElementById('loginInfo');
            const loginBtn = document.getElementById('loginBtn');

            errorDiv.style.display = 'none';
            infoDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = 'Both fields are required.';
                errorDiv.style.display = 'block';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                if (!user.emailVerified) {
                    infoDiv.innerHTML = `Email not verified. <span class="resend-link" id="resendVerification">Resend verification email</span>`;
                    infoDiv.style.display = 'block';
                    document.getElementById('resendVerification').addEventListener('click', async () => {
                        await user.sendEmailVerification();
                        infoDiv.textContent = 'Verification email sent. Please check your inbox.';
                    });
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign in';
                    return;
                }

                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    await auth.signOut();
                    errorDiv.textContent = 'User record not found. Please contact admin.';
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign in';
                    return;
                }

                const userData = userDoc.data();

                // Allow nonTeachingStaff role OR teacher with staffAccess flag (promoted)
                const isStaff = userData.role === 'nonTeachingStaff';
                const isPromotedTeacher = userData.role === 'teacher' && userData.staffAccess === true;

                if (!isStaff && !isPromotedTeacher) {
                    await auth.signOut();
                    errorDiv.textContent = 'Access denied. You are not authorized as non‑teaching staff.';
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign in';
                    return;
                }

                if (!userData.approved) {
                    await auth.signOut();
                    errorDiv.textContent = 'Your account is pending approval. You cannot log in yet.';
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign in';
                    return;
                }

                window.location.href = 'nonteaching-dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign in';
            }
        });

        // ==================== SIGNUP ====================
        document.getElementById('staffSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('signupFirstName').value.trim();
            const surname = document.getElementById('signupSurname').value.trim();
            const phoneInput = document.getElementById('signupPhone').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value.trim();
            const confirm = document.getElementById('signupConfirm').value.trim();
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');
            const signupBtn = document.getElementById('signupBtn');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!firstName || !surname || !phoneInput || !email || !password || !confirm) {
                errorDiv.textContent = 'All fields are required.';
                errorDiv.style.display = 'block';
                return;
            }
            if (password.length < 8) {
                errorDiv.textContent = 'Password must be at least 8 characters.';
                errorDiv.style.display = 'block';
                return;
            }
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match.';
                errorDiv.style.display = 'block';
                return;
            }

            let phone = phoneInput.replace(/\s+/g, '');
            if (!phone.startsWith('+')) {
                phone = '+234' + phone.replace(/^0+/, '');
            }

            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating account...';

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                await user.sendEmailVerification();

                await db.collection('users').doc(user.uid).set({
                    firstName,
                    surname,
                    phone,
                    email: user.email,
                    role: 'nonTeachingStaff',
                    approved: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                successDiv.textContent = 'Registration successful! Please verify your email. Your account will be reviewed by admin.';
                successDiv.style.display = 'block';
                await auth.signOut();

                setTimeout(() => loginTab.click(), 5000);
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } finally {
                signupBtn.disabled = false;
                signupBtn.textContent = 'Register';
            }
        });
    </script>
</body>
</html>
