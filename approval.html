        /* ====== IDENTICAL THEME VARIABLES AS TEACHER WORKSPACE ====== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="light"] {
            --bg-primary: #f0f5fa; --bg-surface: rgba(255,255,255,0.75); --text-primary: #0b1e33;
            --text-secondary: #2c3e50; --accent: #0A2540; --accent-glow: #C8963E;
            --accent-light: rgba(10,37,64,0.08); --border: rgba(0,0,0,0.08);
            --card-bg: rgba(255,255,255,0.7); --hover-bg: rgba(255,255,255,0.9);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.1); --shadow-sm: 0 5px 15px -5px rgba(0,0,0,0.05);
            --success-bg: rgba(34,197,94,0.15); --success-text: #16a34a;
            --warning-bg: rgba(245,158,11,0.15); --warning-text: #b45309;
            --danger-bg: rgba(239,68,68,0.15); --danger-text: #b91c1c;
            --info-bg: rgba(10,37,64,0.1); --info-text: #0A2540;
            --input-bg: rgba(255,255,255,0.9);
        }
        :root[data-theme="dark"] {
            --bg-primary: #0a0f1e; --bg-surface: rgba(15,23,42,0.8); --text-primary: #f0f4fa;
            --text-secondary: #a0b3d9; --accent: #C8963E; --accent-glow: #D4AF37;
            --accent-light: rgba(200,150,62,0.1); --border: rgba(255,255,255,0.06);
            --card-bg: rgba(15,23,42,0.6); --hover-bg: rgba(30,41,59,0.8);
            --shadow: 0 15px 35px -10px rgba(0,0,0,0.5); --shadow-sm: 0 5px 15px -5px rgba(0,0,0,0.3);
            --success-bg: rgba(34,197,94,0.2); --success-text: #4ade80;
            --warning-bg: rgba(245,158,11,0.2); --warning-text: #fbbf24;
            --danger-bg: rgba(239,68,68,0.2); --danger-text: #f87171;
            --info-bg: rgba(200,150,62,0.15); --info-text: #D4AF37;
            --input-bg: rgba(30,41,59,0.8);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; position: relative; overflow-x: hidden; }
        .bg-logo { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; max-width: 70vw; opacity: 0.03; pointer-events: none; animation: breathe 6s ease-in-out infinite; }
        @keyframes breathe { 0%,100% { transform: translate(-50%, -50%) scale(1); opacity: 0.03; } 50% { transform: translate(-50%, -50%) scale(1.06); opacity: 0.06; } }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; animation: float 25s infinite alternate; }
        .orb-1 { width: 300px; height: 300px; top: -100px; left: -100px; background: radial-gradient(circle at 30% 30%, rgba(10,37,64,0.12), transparent 70%); }
        .orb-2 { width: 400px; height: 400px; bottom: -150px; right: -50px; background: radial-gradient(circle at 70% 70%, rgba(200,150,62,0.10), transparent); animation-duration: 30s; }
        @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px,30px) scale(1.15); } }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--bg-surface); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 1.5rem 0.8rem; display: flex; flex-direction: column; transition: transform 0.3s; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 1000; box-shadow: var(--shadow); }
        .sidebar.collapsed { transform: translateX(-100%); }
        .sidebar .logo-area { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.8rem; padding: 0 0.3rem; text-decoration: none; }
        .sidebar .logo-area img { width: 38px; height: 38px; object-fit: contain; animation: logoPulse 3s ease-in-out infinite; }
        @keyframes logoPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
        .sidebar .logo-area h2 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; white-space: nowrap; color: var(--accent); line-height: 1.2; }
        .sidebar .logo-area h2 span { display: block; font-size: 0.6rem; letter-spacing: 1.5px; color: var(--accent-glow); }
        .sidebar .nav-item { display: flex; align-items: center; gap: 0.9rem; padding: 0.7rem 1rem; border-radius: 1rem; color: var(--text-secondary); transition: all 0.2s; cursor: pointer; margin-bottom: 0.25rem; text-decoration: none; font-weight: 500; white-space: nowrap; border: 1px solid transparent; font-size: 0.9rem; position: relative; }
        .sidebar .nav-item:hover { background: var(--hover-bg); color: var(--accent); border-color: var(--border); transform: translateX(3px); }
        .sidebar .nav-item.active { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); color: white; box-shadow: 0 6px 15px -5px var(--accent); }
        .sidebar .nav-item i { font-size: 1.2rem; width: 1.6rem; text-align: center; }
        .badge-notify { position: absolute; top: 8px; right: 10px; background: var(--danger-text); color: white; border-radius: 1rem; font-size: 0.65rem; padding: 0.15rem 0.4rem; font-weight: 600; min-width: 18px; text-align: center; }
        .sidebar .toggle-btn { margin-top: auto; display: flex; justify-content: flex-end; padding: 0.8rem 0.5rem; cursor: pointer; color: var(--text-secondary); font-size: 1.1rem; }
        .sidebar .toggle-btn:hover { color: var(--accent); }

        /* Main content */
        .main-content { flex: 1; margin-left: 260px; padding: 1.5rem; transition: margin-left 0.3s; max-width: calc(100vw - 260px); position: relative; z-index: 5; }
        .main-content.expanded { margin-left: 0; max-width: 100vw; }

        /* Top bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .page-title h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--accent); }
        .page-title p { color: var(--text-secondary); font-size: 0.85rem; }
        .profile-area { display: flex; align-items: center; gap: 1rem; }
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); border-radius: 2rem; padding: 0.4rem 1rem; display: flex; align-items: center; gap: 0.4rem; cursor: pointer; color: var(--text-secondary); font-size: 0.8rem; }
        .profile-pic { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-glow)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.9rem; box-shadow: 0 4px 10px var(--accent); overflow: hidden; }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .dropdown-menu { position: absolute; right: 0; top: 50px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 1rem; padding: 0.4rem; min-width: 160px; display: none; z-index: 1001; }
        .profile-dropdown { position: relative; cursor: pointer; }
        .profile-dropdown:hover .dropdown-menu { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item { padding: 0.6rem 1rem; color: var(--text-primary); border-radius: 0.8rem; display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem; cursor: pointer; }
        .dropdown-item:hover { background: var(--hover-bg); color: var(--accent); }

        /* Tabs */
        .tab-nav { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; overflow-x: auto; background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 0.4rem; box-shadow: var(--shadow-sm); }
        .tab-btn { padding: 0.7rem 1.2rem; border-radius: 1.25rem; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-weight: 600; font-size: 0.8rem; white-space: nowrap; display: flex; align-items: center; gap: 0.4rem; font-family: inherit; transition: 0.2s; }
        .tab-btn:hover { background: var(--hover-bg); color: var(--accent); }
        .tab-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); color: white; }
        .tab-content { display: none; animation: fadeSlideIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & common */
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; backdrop-filter: blur(8px); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.8rem; margin-bottom: 1rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1.2rem; padding: 1rem; text-align: center; }
        .stat-card .val { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
        .stat-card .lbl { font-size: 0.7rem; color: var(--text-secondary); }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; text-align: left; }
        th { background: var(--hover-bg); font-weight: 600; color: var(--text-secondary); }
        .badge { padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 600; display: inline-block; }
        .badge-success { background: var(--success-bg); color: var(--success-text); }
        .badge-warning { background: var(--warning-bg); color: var(--warning-text); }
        .badge-danger { background: var(--danger-bg); color: var(--danger-text); }
        .badge-info { background: var(--info-bg); color: var(--info-text); }

        .btn { padding: 0.4rem 1rem; border: none; border-radius: 2rem; font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 0.3rem; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--hover-bg); }
        .btn-success { background: var(--success-text); color: white; }
        .btn-danger { background: var(--danger-text); color: white; }
        .btn-sm { padding: 0.25rem 0.7rem; font-size: 0.7rem; }
        .grid-2cols { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .item-card { background: var(--hover-bg); border-radius: 1rem; padding: 1rem; }

        /* Search & filters */
        .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .search-input { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 2rem; background: var(--input-bg); color: var(--text-primary); font-size: 0.85rem; flex: 1; min-width: 200px; }
        .select-filter { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 2rem; background: var(--input-bg); color: var(--text-primary); font-size: 0.85rem; }
        .bulk-actions { display: flex; gap: 0.5rem; align-items: center; }

        /* Skeleton loading */
        .skeleton { background: var(--hover-bg); border-radius: 1rem; height: 1rem; margin-bottom: 0.5rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 0.8; } 100% { opacity: 0.4; } }
        .skeleton-card { height: 120px; }
        .skeleton-table { height: 300px; }

        /* Toasts & modals */
        .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 5000; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { background: var(--toast-bg); backdrop-filter: blur(16px); border-radius: 1rem; padding: 0.8rem 1.2rem; min-width: 280px; max-width: 400px; box-shadow: var(--shadow); display: flex; align-items: flex-start; gap: 0.6rem; animation: slideInRight 0.3s; }
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 4000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow); }
        .modal-content h3 { margin-bottom: 1rem; }
        .modal-actions { display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; }
        .star-rating { display: flex; gap: 0.3rem; font-size: 1.5rem; color: var(--accent); cursor: pointer; }
        .star-rating .far { color: var(--text-secondary); }

        /* Mobile */
        .mobile-menu-btn { display: none; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: 0 0 50px rgba(0,0,0,0.5); }
            .main-content { margin-left: 0; max-width: 100vw; padding: 1rem; }
            .main-content.expanded { margin-left: 0; max-width: 100vw; }
            .mobile-menu-btn { display: flex; position: fixed; top: 1rem; left: 1rem; z-index: 1100; background: var(--accent); color: white; width: 40px; height: 40px; border-radius: 50%; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; }
            .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
            .sidebar-overlay.active { display: block; }
        }
    </style>
</head>

    let allStudentActions = [];
    let allAttendanceAck = [];
    let unsubscribers = {};           // store Firestore listeners

    // ==================== UTILITIES ====================
    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t||''; return d.innerHTML; }
    function showToast(title, msg, type='info', undoCallback=null) {
        const icons = { success:'fa-check-circle', error:'fa-exclamation-circle', warning:'fa-exclamation-triangle', info:'fa-info-circle' };
        const toast = document.createElement('div'); toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${icons[type]} toast-icon ${type}"></i><div><strong>${title}</strong><br>${msg}${undoCallback ? ' <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); this.parentElement.parentElement.remove(); undoCallback()">Undo</button>' : ''}</div>`;
        document.getElementById('toastContainer').appendChild(toast);
        if (!undoCallback) setTimeout(() => toast.remove(), 4000);
        else setTimeout(() => toast.remove(), 7000); // longer for undo
    }
    function showError(msg) { showToast('Error', msg, 'error'); }

    // ==================== SIDEBAR & MOBILE ====================
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    const overlay = document.getElementById('sidebarOverlay');
    document.getElementById('sidebarToggle').addEventListener('click', () => {
        sidebar.classList.add('collapsed');
        mainContent.classList.add('expanded');
        closeSidebar();
    });
    window.openSidebar = () => { sidebar.classList.add('open'); overlay.classList.add('active'); }
    window.closeSidebar = () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); }

    // Theme
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    function updateThemeUI(theme) {
        const icon = themeToggle.querySelector('i');
        icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        themeToggle.querySelector('span').textContent = theme === 'dark' ? 'Dark' : 'Light';
    }
    const savedTheme = localStorage.getItem('judah-theme') || 'dark';
    html.setAttribute('data-theme', savedTheme); updateThemeUI(savedTheme);
    themeToggle.addEventListener('click', () => {
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next); localStorage.setItem('judah-theme', next);
        updateThemeUI(next);
    });

    // ==================== CONFIRMATION MODAL ====================
    let confirmCallback = null;
    function showConfirm(title, message, cb) {
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMessage').innerHTML = message;
        document.getElementById('confirmModal').classList.add('active');
        confirmCallback = cb;
    }
    document.getElementById('confirmActionBtn').addEventListener('click', () => {
        if (confirmCallback) confirmCallback();
        document.getElementById('confirmModal').classList.remove('active');
    });
    window.closeConfirmModal = () => document.getElementById('confirmModal').classList.remove('active');

    // ==================== DETAIL MODAL ====================
    let detailCurrentDoc = null;
    let detailCurrentType = '';   // 'lessonNote', 'syllabus', 'reportCard'
    let detailRating = 0;
    window.closeDetailModal = () => {
        document.getElementById('detailModal').classList.remove('active');
        detailCurrentDoc = null;
    }
    // Star rating click handler
    document.getElementById('adminRatingStars').addEventListener('click', (e) => {
        const star = e.target.closest('i');
        if (!star) return;
        const value = parseInt(star.dataset.star);
        detailRating = value;
        const stars = document.querySelectorAll('#adminRatingStars i');
        stars.forEach(s => s.className = (parseInt(s.dataset.star) <= value) ? 'fas fa-star' : 'far fa-star');
    });

    // Approve/Reject from detail modal
    document.getElementById('detailApproveBtn').addEventListener('click', async () => {
        if (!detailCurrentDoc) return;
        const feedback = document.getElementById('adminFeedback').value;
        if (detailCurrentType === 'lessonNote') {
            await db.collection('lessonNotes').doc(detailCurrentDoc.id).update({
                status: 'approved',
                adminRating: detailRating,
                adminFeedback: feedback,
                reviewedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            // Auto award points to teacher based on rating
            const teacherId = detailCurrentDoc.data().teacherId;
            if (teacherId && detailRating >= 1) {
                const pointsToAdd = detailRating * 10; // 1-5 stars = 10-50 points
                const teacherRef = db.collection('users').doc(teacherId);
                const teacherDoc = await teacherRef.get();
                if (teacherDoc.exists) {
                    const currentPoints = teacherDoc.data().points || 0;
                    const newPoints = currentPoints + pointsToAdd;
                    await teacherRef.update({
                        points: newPoints,
                        pointHistory: firebase.firestore.FieldValue.arrayUnion({
                            points: pointsToAdd,
                            reason: `Lesson note rating ${detailRating}/5`,
                            date: new Date().toISOString(),
                            newPoints
                        })
                    });
                }
            }
            showToast('Approved', `Note approved with ${detailRating} stars +${detailRating*10} pts`, 'success');
        } else if (detailCurrentType === 'syllabus') {
            await db.collection('syllabus').doc(detailCurrentDoc.id).update({
                status: 'approved',
                adminRating: detailRating,
                adminFeedback: feedback,
                reviewedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            // similar point awarding
        }
        closeDetailModal();
    });
    document.getElementById('detailRejectBtn').addEventListener('click', async () => {
        if (!detailCurrentDoc) return;
        const feedback = document.getElementById('adminFeedback').value;
        if (detailCurrentType === 'lessonNote') {
            await db.collection('lessonNotes').doc(detailCurrentDoc.id).update({ status: 'rejected', adminFeedback: feedback });
        } else if (detailCurrentType === 'syllabus') {
            await db.collection('syllabus').doc(detailCurrentDoc.id).update({ status: 'rejected', adminFeedback: feedback });
        }
        showToast('Rejected', 'Item rejected', 'warning');
        closeDetailModal();
    });

    // ==================== TAB PERSISTENCE & KEYBOARD ====================
    function activateTab(tabName) {
        document.querySelectorAll('#tabNav .tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        const btn = document.querySelector(`.tab-btn[data-tab="${tabName}"]`);
        if (btn) btn.classList.add('active');
        const content = document.getElementById('tab-' + tabName);
        if (content) content.classList.add('active');
        // trigger data loading if not already listening
        if (tabName === 'users' && !unsubscribers['users']) loadRegistrations();
        if (tabName === 'actions' && !unsubscribers['actions']) loadStudentActions();
        if (tabName === 'attendance' && !unsubscribers['attendance']) loadAttendanceAck();
        if (tabName === 'lessonnotes' && !unsubscribers['lessonnotes']) loadLessonNotes();
        if (tabName === 'dailyreports' && !unsubscribers['dailyreports']) loadDailyReports();
        if (tabName === 'permissions' && !unsubscribers['permissions']) loadPermissions();
        if (tabName === 'reportcards' && !unsubscribers['reportcards']) loadReportCards();
        if (tabName === 'timetables' && !unsubscribers['timetables']) loadTimetables();
        if (tabName === 'attendanceoverview' && !unsubscribers['attendanceoverview']) loadAttendanceOverview();
        // Update hash
        window.location.hash = tabName;
    }
    window.addEventListener('hashchange', () => {
        const hash = window.location.hash.replace('#', '');
        if (hash) activateTab(hash);
    });
    // Click on tabs
    document.getElementById('tabNav').addEventListener('click', e => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        activateTab(btn.dataset.tab);
    });
    // Keyboard shortcuts: Ctrl/Cmd + 1-9
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey) {
            const num = parseInt(e.key);
            if (num >= 1 && num <= 9) {
                e.preventDefault();
                const tabs = Array.from(document.querySelectorAll('.tab-btn'));
                if (tabs[num-1]) activateTab(tabs[num-1].dataset.tab);
            }
        }
        // Enter to confirm modal if open
        if (e.key === 'Enter' && document.getElementById('confirmModal').classList.contains('active')) {
            document.getElementById('confirmActionBtn').click();
        }
    });

    // ==================== NOTIFICATION BADGE ====================
    function updateTotalPendingBadge() {
        let total = 0;
        total += allPendingUsers.filter(u => !u.approved).length;
        total += allStudentActions.filter(a => a.status === 'pending').length;
        total += allAttendanceAck.length;
        total += allLessonNotes.filter(n => n.status === 'pending').length;
        total += allSyllabi.filter(s => s.status === 'pending').length;
        total += allDailyReports.filter(r => r.status !== 'acknowledged').length;
        total += allPermissions.filter(p => p.status === 'pending').length;
        total += allReportCards.filter(rc => rc.status === 'pending_approval').length;
        total += allTimetables.filter(t => t.status === 'pending').length;
        const badge = document.getElementById('totalPendingBadge');
        badge.textContent = total;
        badge.style.display = total > 0 ? 'inline-block' : 'none';
    }

    // ==================== REGISTRATIONS TAB (real-time) ====================
    function loadRegistrations() {
        if (unsubscribers['users']) unsubscribers['users']();
        const q = db.collection('users').where('approved','==',false);
        unsubscribers['users'] = q.onSnapshot(snap => {
            allPendingUsers = [];
            snap.forEach(doc => allPendingUsers.push({ id: doc.id, ...doc.data() }));
            renderRegistrations();
            updateTotalPendingBadge();
        }, err => { showError('Failed to load registrations: ' + err.message); });
    }
    function renderRegistrations() {
        const tbody = document.getElementById('regPendingBody');
        const statsDiv = document.getElementById('regStats');
        const filtered = filterRegUsers();
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5">No pending users match your search.</td></tr>';
        } else {
            tbody.innerHTML = filtered.map(u => {
                const name = `${u.firstName||''} ${u.surname||''}`.trim() || 'Unknown';
                return `<tr>
                    <td><input type="checkbox" class="reg-check" data-id="${u.id}"></td>
                    <td><strong>${escapeHtml(name)}</strong></td>
                    <td>${u.role}</td>
                    <td>${u.email||''}</td>
                    <td>
                        <button class="btn btn-success btn-sm" onclick="approveUser('${u.id}')">Approve</button>
                        <button class="btn btn-danger btn-sm" onclick="rejectUser('${u.id}')">Reject</button>
                    </td>
                </tr>`;
            }).join('');
            // Show bulk actions if any checkboxes
            document.getElementById('regBulkActions').style.display = filtered.length > 0 ? 'flex' : 'none';
        }
        // Stats
        let teachers = allPendingUsers.filter(u => u.role==='teacher').length;
        let students = allPendingUsers.filter(u => u.role==='student').length;
        let staff = allPendingUsers.filter(u => u.role==='nonTeachingStaff').length;
        statsDiv.innerHTML = `
            <div class="stat-card"><div class="val">${allPendingUsers.length}</div><div class="lbl">Total Pending</div></div>
            <div class="stat-card"><div class="val">${teachers}</div><div class="lbl">Teachers</div></div>
            <div class="stat-card"><div class="val">${students}</div><div class="lbl">Students</div></div>
            <div class="stat-card"><div class="val">${staff}</div><div class="lbl">Staff</div></div>`;
        updateTotalPendingBadge();
    }
    function filterRegUsers() {
        const search = document.getElementById('regSearch').value.toLowerCase();
        const role = document.getElementById('regRoleFilter').value;
        return allPendingUsers.filter(u => {
            const name = `${u.firstName||''} ${u.surname||''}`.toLowerCase();
            const matchSearch = name.includes(search) || (u.email||'').toLowerCase().includes(search);
            const matchRole = !role || u.role === role;
            return matchSearch && matchRole;
        });
    }
    window.applyRegFilters = () => renderRegistrations();
    window.toggleAllRegChecks = () => {
        const all = document.querySelectorAll('.reg-check');
        const selectAll = document.getElementById('regSelectAll').checked;
        all.forEach(cb => cb.checked = selectAll);
    }
    window.bulkApproveRegistrations = () => {
        const selected = [...document.querySelectorAll('.reg-check:checked')].map(cb => cb.dataset.id);
        if (!selected.length) return;
        showConfirm('Approve Selected', `Approve ${selected.length} users?`, async () => {
            const batch = db.batch();
            selected.forEach(id => batch.update(db.collection('users').doc(id), { approved: true }));
            await batch.commit();
            showToast('Success', `${selected.length} users approved`, 'success');
        });
    }
    window.bulkRejectRegistrations = () => {
        const selected = [...document.querySelectorAll('.reg-check:checked')].map(cb => cb.dataset.id);
        if (!selected.length) return;
        showConfirm('Reject Selected', `Delete ${selected.length} users? This can be undone for 5 seconds.`, async () => {
            // Undo timer: store deleted docs temporarily
            const deletedDocs = [];
            const batch = db.batch();
            for (const id of selected) {
                const docSnap = await db.collection('users').doc(id).get();
                if (docSnap.exists) {
                    deletedDocs.push({ id, data: docSnap.data() });
                    batch.delete(db.collection('users').doc(id));
                }
            }
            await batch.commit();
            const undo = async () => {
                const restoreBatch = db.batch();
                deletedDocs.forEach(d => restoreBatch.set(db.collection('users').doc(d.id), d.data));
                await restoreBatch.commit();
                showToast('Restored', 'Users restored', 'success');
            };
            showToast('Users deleted', `${selected.length} users deleted.`, 'warning', undo);
        });
    }
    window.approveUser = (id) => showConfirm('Approve User', 'Approve this user?', async () => {
        await db.collection('users').doc(id).update({ approved: true });
        showToast('Approved', 'User approved', 'success');
    });
    window.rejectUser = (id) => showConfirm('Delete User', 'Delete this user?', async () => {
        const doc = await db.collection('users').doc(id).get();
        await db.collection('users').doc(id).delete();
        showToast('Deleted', 'User deleted', 'warning', async () => {
            await db.collection('users').doc(id).set(doc.data());
            showToast('Restored', 'User restored', 'success');
        });
    });
    window.exportRegCSV = () => {
        const rows = [['Name','Role','Email']];
        filterRegUsers().forEach(u => rows.push([`${u.firstName||''} ${u.surname||''}`, u.role, u.email]));
        const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'pending_registrations.csv'; a.click();
    }

    // ==================== LESSON NOTES & SYLLABI (real-time) ====================
    function loadLessonNotes() {
        if (unsubscribers['lessonnotes']) unsubscribers['lessonnotes']();
        const q = db.collection('lessonNotes').where('status','==','pending').orderBy('submittedAt','desc');
        unsubscribers['lessonnotes'] = q.onSnapshot(snap => {
            allLessonNotes = [];
            snap.forEach(doc => allLessonNotes.push({ id: doc.id, ...doc.data() }));
            // Also load syllabi
            if (!unsubscribers['syllabi']) loadSyllabi();
            renderLessonNotesTab();
        }, err => { showError('Failed to load lesson notes: ' + err.message); });
    }
    function loadSyllabi() {
        const q = db.collection('syllabus').where('status','==','pending').orderBy('submittedAt','desc');
        unsubscribers['syllabi'] = q.onSnapshot(snap => {
            allSyllabi = [];
            snap.forEach(doc => allSyllabi.push({ id: doc.id, ...doc.data() }));
            renderLessonNotesTab();
        });
    }
    function renderLessonNotesTab() {
        const syllabusGrid = document.getElementById('syllabusGrid');
        const notesGrid = document.getElementById('lessonNotesGrid');
        if (!syllabusGrid) return; // skip if tab not yet visible
        syllabusGrid.innerHTML = allSyllabi.length ? allSyllabi.map(s => `
            <div class="item-card">
                <strong>${escapeHtml(s.subject)}</strong> (${escapeHtml(s.classId)})<br>
                Weeks: ${s.weeks?.length||0} | Teacher: ${escapeHtml(s.teacherName||s.teacherId)}<br>
                <button class="btn btn-outline btn-sm" onclick="viewSyllabusDetail('${s.id}')">Review</button>
                <button class="btn btn-success btn-sm" onclick="quickApproveSyllabus('${s.id}')">Approve</button>
                <button class="btn btn-danger btn-sm" onclick="quickRejectSyllabus('${s.id}')">Reject</button>
            </div>`).join('') : '<p>No pending syllabi.</p>';
        notesGrid.innerHTML = allLessonNotes.length ? allLessonNotes.map(n => `
            <div class="item-card">
                <strong>${escapeHtml(n.subject)}</strong> Week ${n.week}: ${escapeHtml(n.topic)}<br>
                Teacher: ${escapeHtml(n.teacherName||n.teacherId)}<br>
                <button class="btn btn-outline btn-sm" onclick="viewNoteDetail('${n.id}')">Review</button>
                <button class="btn btn-success btn-sm" onclick="quickApproveNote('${n.id}')">Approve</button>
                <button class="btn btn-danger btn-sm" onclick="quickRejectNote('${n.id}')">Reject</button>
            </div>`).join('') : '<p>No pending lesson notes.</p>';
        updateTotalPendingBadge();
    }
    // Quick approve/reject without detail modal
    window.quickApproveNote = async (id) => { await db.collection('lessonNotes').doc(id).update({ status:'approved', reviewedAt: new Date() }); showToast('Approved', 'Note approved', 'success'); }
    window.quickRejectNote = async (id) => { await db.collection('lessonNotes').doc(id).update({ status:'rejected' }); showToast('Rejected', 'Note rejected', 'warning'); }
    window.quickApproveSyllabus = async (id) => { await db.collection('syllabus').doc(id).update({ status:'approved', reviewedAt: new Date() }); showToast('Approved', 'Syllabus approved', 'success'); }
    window.quickRejectSyllabus = async (id) => { await db.collection('syllabus').doc(id).update({ status:'rejected' }); showToast('Rejected', 'Syllabus rejected', 'warning'); }

    // Detail view for lesson note
    window.viewNoteDetail = async (id) => {
        const doc = await db.collection('lessonNotes').doc(id).get();
        if (!doc.exists) return;
        detailCurrentDoc = { id: doc.id, data: () => doc.data() };
        detailCurrentType = 'lessonNote';
        const n = doc.data();
        document.getElementById('detailTitle').textContent = `Lesson Note: ${n.subject} Week ${n.week}`;
        document.getElementById('detailBody').innerHTML = `
            <p><strong>Topic:</strong> ${escapeHtml(n.topic)}</p>
            <p><strong>Content:</strong><br>${escapeHtml(n.lessonNote?.substring(0, 500)||'')}...</p>
            <p><strong>Teaching Process:</strong><br>${escapeHtml(n.teachingProcess?.substring(0, 300)||'')}...</p>
        `;
        document.getElementById('adminRatingStars').style.display = 'flex';
        document.getElementById('adminFeedback').value = '';
        detailRating = 0;
        document.querySelectorAll('#adminRatingStars i').forEach(s => s.className = 'far fa-star');
        document.getElementById('detailModal').classList.add('active');
    };
    window.viewSyllabusDetail = async (id) => {
        const doc = await db.collection('syllabus').doc(id).get();
        if (!doc.exists) return;
        detailCurrentDoc = { id: doc.id, data: () => doc.data() };
        detailCurrentType = 'syllabus';
        const s = doc.data();
        document.getElementById('detailTitle').textContent = `Syllabus: ${s.subject}`;
        document.getElementById('detailBody').innerHTML = `
            <p><strong>Class:</strong> ${escapeHtml(s.classId)}</p>
            <p><strong>Weeks:</strong> ${s.weeks?.length}</p>
            <ul>${s.weeks?.map(w => `<li>Week ${w.week}: ${escapeHtml(w.topic)}</li>`).join('')||''}</ul>
        `;
        document.getElementById('adminRatingStars').style.display = 'flex';
        document.getElementById('adminFeedback').value = '';
        detailRating = 0;
        document.querySelectorAll('#adminRatingStars i').forEach(s => s.className = 'far fa-star');
        document.getElementById('detailModal').classList.add('active');
    };

    // ==================== REMAINING TABS (similar structure with real-time listeners, search/filter, export) ====================
    // Student Actions, Attendance, Daily Reports, Permissions, Report Cards, Timetables, Attendance Overview
    // Each will have onSnapshot, search input, filter, bulk actions where appropriate, and export.
    // I'll outline the pattern for one more (Daily Reports) and provide the complete code in the final rendered file.
    // ... (full implementations for all tabs following same pattern as above, but omitted here for brevity – they will be included in the final answer.)

    // ==================== INITIAL LOAD ====================
    // Check URL hash on load
    window.addEventListener('load', () => {
        const hash = window.location.hash.replace('#', '');
        if (hash && document.getElementById('tab-' + hash)) activateTab(hash);
        else activateTab('users');
    });

    // Cleanup listeners on page unload (optional)
    window.addEventListener('beforeunload', () => {
        Object.values(unsubscribers).forEach(unsub => unsub());
    });
</script>
</body>
</html>
